<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITSC World Cup 2026 Challenge</title>

  <!-- Inter font from Google Fonts. Clean, modern, great on TV screens. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES (Design Tokens)
       Change these to retheme the entire dashboard.
    ============================================================ */
    :root {
      --bg-base:        #07070f;   /* Page background */
      --bg-panel:       #10101e;   /* Card/panel background */
      --bg-panel-alt:   #14142a;   /* Slightly lighter panel */
      --bg-row-even:    #12122050; /* Leaderboard even rows */
      --bg-row-hover:   #1e1e3a;   /* Leaderboard highlight */

      --scarlet:        #C8102E;   /* Rutgers Scarlet, primary accent */
      --scarlet-dim:    #8a0b1f;   /* Darker scarlet for subtle use */
      --gold:           #FFD700;   /* Gold, secondary accent */
      --gold-dim:       #b39800;

      --live-green:     #00e676;   /* Live match indicator */
      --positive:       #00c853;   /* Point gains */
      --negative:       #ff1744;   /* Point losses */
      --neutral:        #78909c;   /* Zero change */

      --text-primary:   #f0f0f8;
      --text-secondary: #9090b8;
      --text-muted:     #505070;

      --border:         rgba(255, 255, 255, 0.06);
      --border-accent:  rgba(200, 16, 46, 0.4);

      --font:           'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      --radius-sm:      6px;
      --radius-md:      10px;
      --radius-lg:      14px;

      /* Panel shadows for depth layering */
      --shadow-panel:   0 4px 24px rgba(0,0,0,0.6);
    }

    /* ============================================================
       RESET AND BASE
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================================
       ROOT DASHBOARD GRID
       Three rows: header, main content, country status bar
    ============================================================ */
    #dashboard {
      display: grid;
      grid-template-rows: 7vh 1fr;
      grid-template-areas:
        "header"
        "main";
      height: 100vh;
      width: 100%;
      padding: 1vh 1vw;
      gap: 1vh;
      background:
        radial-gradient(ellipse 800px 400px at 0% 0%, rgba(200, 16, 46, 0.06) 0%, transparent 70%),
        radial-gradient(ellipse 600px 400px at 100% 100%, rgba(255, 215, 0, 0.03) 0%, transparent 70%);
    }

    /* ============================================================
       HEADER
    ============================================================ */
    #header {
      grid-area: header;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-panel);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 0 24px;
      box-shadow: var(--shadow-panel);
      border-left: 4px solid var(--scarlet);
      position: relative;
      overflow: hidden;
    }

    /* Subtle diagonal stripe in the header */
    #header::before {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 300px;
      background: linear-gradient(135deg, transparent 40%, rgba(200,16,46,0.04) 100%);
      pointer-events: none;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* World Cup trophy icon (Unicode ball) */
    .header-icon {
      width: 48px;
      height: 48px;
      background: var(--scarlet);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .header-title h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      line-height: 1.1;
    }

    .header-title p {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0px, 0.4vh, 4px);
    }

    #current-time {
      font-size: clamp(16px, 3vh, 32px);
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }

    #current-date {
      font-size: clamp(9px, 1.2vh, 13px);
      color: var(--text-secondary);
      font-weight: 500;
      white-space: nowrap;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .tournament-badge {
      text-align: right;
    }

    .tournament-badge .day-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .tournament-badge .day-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--gold);
    }

    .refresh-status {
      text-align: right;
    }

    .refresh-status .refresh-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
    }

    .refresh-status .refresh-time {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* Flashes briefly on refresh */
    .refresh-flash {
      color: var(--live-green) !important;
    }

    /* ============================================================
       MAIN CONTENT AREA
       Two columns: leaderboard | bracket + golden boot
    ============================================================ */
    #main {
      grid-area: main;
      display: grid;
      grid-template-columns: 38fr 62fr;
      gap: 10px;
      min-height: 0;
    }

    /* Right column stacks bracket panel + golden boot */
    #right-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    #bracket-panel {
      flex: 3;
      min-height: 0;
    }

    #bracket-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px 12px;
      display: flex;
      flex-direction: column;
    }

    #bracket-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #right-col #golden-boot-panel {
      flex: 0 0 auto;
      max-height: 220px;
    }

    /* ============================================================
       SHARED PANEL STYLES
    ============================================================ */
    .panel {
      background: var(--bg-panel);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-panel);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--scarlet);
    }

    .panel-subtitle {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ============================================================
       LEADERBOARD PANEL
    ============================================================ */
    #leaderboard-panel {
      min-height: 0;
    }

    #leaderboard-scroll {
      flex: 1;
      overflow-y: auto;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    #leaderboard-list {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Survival count in leaderboard header ── */
    .survival-count {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .survival-count strong { color: var(--positive); }

    /* ── Alive / eliminated indicator dot ── */
    .alive-dot {
      width: 7px; height: 7px; border-radius: 50%;
      flex-shrink: 0; margin-right: 2px;
    }
    .alive-dot.alive        { background: var(--positive); }
    .alive-dot.eliminated   { background: var(--negative); opacity: 0.55; }
    .alive-dot.not-in       { background: var(--text-muted); opacity: 0.4; }

    /* ── Stage badge (R32, R16, QF, SF, FIN, OUT) ── */
    .stage-badge {
      font-size: 8px; font-weight: 800; letter-spacing: 0.5px;
      padding: 1px 5px; border-radius: 3px; flex-shrink: 0;
      text-transform: uppercase;
    }
    .stage-badge.alive      { background: rgba(0,200,83,0.16); color: var(--positive); border: 1px solid rgba(0,200,83,0.28); }
    .stage-badge.eliminated { background: rgba(255,23,68,0.10); color: var(--negative); border: 1px solid rgba(255,23,68,0.22); opacity: 0.8; }
    .stage-badge.not-in     { background: rgba(80,80,112,0.20); color: var(--text-muted); border: 1px solid rgba(80,80,112,0.25); }

    .row-flag-em { font-size: 14px; flex-shrink: 0; line-height: 1; }

    .leaderboard-row {
      display: grid;
      /* Rank | Identity | Bar+Stats | Points */
      grid-template-columns: 44px 1fr 180px 110px;
      align-items: center;
      padding: 0 16px;
      min-height: 52px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s ease;
    }

    .leaderboard-row:last-child {
      border-bottom: none;
    }

    .leaderboard-row:nth-child(even) {
      background: rgba(255,255,255,0.015);
    }

    .leaderboard-row.is-live {
      background: rgba(0, 230, 118, 0.05);
    }

    .leaderboard-row.rank-1 { border-left: 3px solid var(--gold); }
    .leaderboard-row.rank-2 { border-left: 3px solid #c0c0c0; }
    .leaderboard-row.rank-3 { border-left: 3px solid #cd7f32; }

    .row-rank {
      font-size: 16px;
      font-weight: 900;
      color: var(--text-muted);
      text-align: center;
    }

    .row-rank.rank-1 { color: var(--gold); }
    .row-rank.rank-2 { color: #c0c0c0; }
    .row-rank.rank-3 { color: #cd7f32; }

    .row-identity {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      overflow: hidden;
    }

    .row-flag {
      width: 30px;
      height: 22px;
      object-fit: cover;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .row-flag-fallback {
      width: 30px;
      height: 22px;
      background: var(--bg-panel-alt);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .row-name-line {
      display: flex;
      align-items: baseline;
      gap: 7px;
      min-width: 0;
      overflow: hidden;
    }

    .row-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex-shrink: 1;
    }

    .row-name-sep {
      color: var(--text-muted);
      font-size: 12px;
      flex-shrink: 0;
    }

    .row-country {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-live-badge {
      display: inline-block;
      background: var(--live-green);
      color: #000;
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 0.8px;
      padding: 1px 4px;
      border-radius: 3px;
      margin-left: 5px;
      vertical-align: middle;
    }

    /* ── Progress bar + stats section ── */
    .row-bar-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      padding: 0 14px;
    }

    .row-bar-track {
      height: 5px;
      background: rgba(255,255,255,0.10);
      border-radius: 3px;
      overflow: hidden;
    }

    .row-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
      min-width: 2px;
    }

    .row-bar-fill.rank-1     { background: var(--gold); }
    .row-bar-fill.rank-2     { background: #c0c0c0; }
    .row-bar-fill.rank-3     { background: #cd7f32; }
    .row-bar-fill.rank-other { background: var(--scarlet); }

    .row-stats-line {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .row-record { display: flex; gap: 5px; }
    .row-record-item { font-weight: 700; }
    .row-record-item.w { color: var(--positive); }
    .row-record-item.d { color: var(--gold-dim); }
    .row-record-item.l { color: var(--negative); }

    .row-plays-today {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: rgba(255,215,0,0.10);
      border: 1px solid rgba(255,215,0,0.22);
      color: var(--gold);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.4px;
      padding: 0px 5px;
      border-radius: 3px;
    }

    /* ── Points section ── */
    .row-points-section {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 1px;
    }

    .row-points {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .row-today {
      font-size: 10px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .row-today.positive { color: var(--positive); }
    .row-today.negative { color: var(--negative); }
    .row-today.zero     { color: var(--text-muted); }

    /* Golden boot panel sizing handled via #right-col above */

    #golden-boot-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .boot-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 3px 4px;
      border-radius: 4px;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
      min-width: 0;
    }

    .boot-row:last-child { border-bottom: none; }

    .boot-rank {
      font-size: 12px; flex-shrink: 0;
      min-width: 22px; text-align: center;
    }
    .boot-flag { flex-shrink: 0; display: flex; align-items: center; }

    .boot-player {
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .boot-goals {
      font-weight: 800;
      font-size: 13px;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      margin-left: 4px;
    }

    /* ============================================================
       GROUP STANDINGS PANEL (middle column)
    ============================================================ */
    #groups-panel {
      min-height: 0;
    }

    #groups-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .group-table {
      flex-shrink: 0;
    }

    .group-table-title {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      padding: 2px 4px 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }

    .group-col-headers {
      display: grid;
      grid-template-columns: 18px 26px 1fr 20px 20px 20px 28px;
      gap: 3px;
      padding: 3px 4px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .group-row {
      display: grid;
      grid-template-columns: 18px 26px 1fr 20px 20px 20px 28px;
      align-items: center;
      gap: 3px;
      padding: 4px 4px;
      border-radius: 4px;
      font-size: 11px;
      transition: background 0.15s;
    }

    .group-row.is-pick {
      background: rgba(200, 16, 46, 0.10);
      border: 1px solid rgba(200, 16, 46, 0.18);
    }

    .group-row.advancing {
      border-left: 2px solid rgba(0, 200, 83, 0.45);
    }

    .group-row.advancing.is-pick {
      border-left: 2px solid rgba(200, 16, 46, 0.6);
    }

    .group-pos {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-align: center;
    }

    .group-team-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .group-team-name.is-pick {
      color: #ff8fa3;
    }

    .group-stat {
      text-align: center;
      color: var(--text-secondary);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .group-pts-col {
      text-align: right;
      font-weight: 800;
      font-size: 12px;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .group-pts-col.is-pick {
      color: var(--gold);
    }

    /* Right panel replaced by #right-col */

    /* ============================================================
       MATCHES PANEL
    ============================================================ */
    #matches-list {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 16px;
    }

    .match-card {
      background: var(--bg-panel-alt);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      padding: 10px 14px;
      flex-shrink: 0;
    }

    /* Live match gets a green border and glow */
    .match-card.live {
      border-color: rgba(0, 230, 118, 0.35);
      background: rgba(0, 230, 118, 0.04);
      box-shadow: 0 0 16px rgba(0, 230, 118, 0.08);
    }

    .match-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .match-status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--live-green);
      animation: pulse-live 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-live {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .live-text { color: var(--live-green); }
    .upcoming-text { color: var(--text-muted); }

    .match-group-label {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .match-teams {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .match-team {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .match-team.away {
      flex-direction: row-reverse;
      text-align: right;
    }

    .match-team-flag {
      width: 28px;
      height: 21px;
      object-fit: cover;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .match-team-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .match-score-block {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .match-score {
      font-size: 26px;
      font-weight: 900;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      min-width: 22px;
      text-align: center;
    }

    .match-score-divider {
      font-size: 18px;
      font-weight: 300;
      color: var(--text-muted);
    }

    .match-kickoff {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .match-staff-row {
      margin-top: 6px;
      font-size: 10px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .staff-in-match {
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ============================================================
       RECENT RESULTS PANEL
    ============================================================ */
    #results-list {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 16px;
    }

    .result-card {
      background: var(--bg-panel-alt);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      padding: 8px 14px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .result-team {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .result-team.away {
      flex-direction: row-reverse;
    }

    .result-flag {
      width: 24px;
      height: 18px;
      object-fit: cover;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .result-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .result-score-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .result-score {
      font-size: 20px;
      font-weight: 900;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }

    .result-meta {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
    }

    /* ============================================================
       COUNTRY STATUS BAR
    ============================================================ */
    #statusbar {
      grid-area: statusbar;
      background: var(--bg-panel);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-panel);
      padding: 10px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .statusbar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .statusbar-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--scarlet);
    }

    .statusbar-legend {
      display: flex;
      gap: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .legend-dot.active   { background: var(--positive); }
    .legend-dot.live     { background: var(--live-green); animation: pulse-live 1.5s ease-in-out infinite; }
    .legend-dot.upcoming { background: var(--gold); }
    .legend-dot.none     { background: var(--text-muted); }

    #country-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-content: flex-start;
    }

    .country-tile {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-panel-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px 10px 4px 6px;
      flex-shrink: 0;
    }

    .country-tile.status-live {
      border-color: rgba(0, 230, 118, 0.4);
      background: rgba(0, 230, 118, 0.06);
    }

    .country-tile.status-active {
      border-color: rgba(0, 200, 83, 0.25);
    }

    .country-tile-flag {
      width: 24px;
      height: 18px;
      object-fit: cover;
      border-radius: 2px;
    }

    .country-tile-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .country-tile-pts {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      margin-left: 2px;
    }

    .country-tile-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-left: 2px;
    }

    .country-tile-dot.live     { background: var(--live-green); animation: pulse-live 1.5s ease-in-out infinite; }
    .country-tile-dot.active   { background: var(--positive); }
    .country-tile-dot.upcoming { background: var(--gold); }
    .country-tile-dot.none     { background: var(--text-muted); }

    /* ============================================================
       UTILITY AND ANIMATION
    ============================================================ */

    /* Fade in animation used on data refresh */
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fade-in 0.4s ease forwards;
    }

    /* Points change animation (flash green/red briefly) */
    @keyframes point-flash-pos {
      0%   { color: var(--text-primary); }
      30%  { color: var(--positive); }
      100% { color: var(--text-primary); }
    }

    @keyframes point-flash-neg {
      0%   { color: var(--text-primary); }
      30%  { color: var(--negative); }
      100% { color: var(--text-primary); }
    }

    .flash-positive { animation: point-flash-pos 1.2s ease forwards; }
    .flash-negative { animation: point-flash-neg 1.2s ease forwards; }

    /* ── Enhanced match card ── */
    .match-details {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0 8px;
      margin-top: 5px;
      font-size: 10px;
    }

    .match-detail-home {
      display: flex;
      flex-direction: column;
      gap: 2px;
      color: var(--text-secondary);
    }

    .match-detail-away {
      display: flex;
      flex-direction: column;
      gap: 2px;
      align-items: flex-end;
      text-align: right;
      color: var(--text-secondary);
    }

    .match-detail-center { /* spacer */ }

    .match-point-impact {
      margin-top: 5px;
      border-top: 1px solid var(--border);
      padding-top: 5px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .impact-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
    }

    .impact-staff  { color: var(--text-secondary); font-weight: 500; }
    .impact-pts    { font-weight: 700; font-variant-numeric: tabular-nums; }
    .impact-pts.positive { color: var(--positive); }
    .impact-pts.negative { color: var(--negative); }
    .impact-pts.zero     { color: var(--text-muted); }

    /* ── Today's Point Movers ── */
    #movers-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 6px 14px 8px;
    }

    .mover-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
    }

    .mover-row:last-child { border-bottom: none; }
    .mover-name  { flex: 1; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mover-country { color: var(--text-muted); font-size: 10px; }
    .mover-delta { font-weight: 800; font-variant-numeric: tabular-nums; flex-shrink: 0; font-size: 12px; }
    .mover-delta.positive { color: var(--positive); }
    .mover-delta.negative { color: var(--negative); }
    .mover-delta.zero     { color: var(--text-muted); }

    /* ── Staff Pick Summary ── */
    #picks-summary-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 6px 14px 8px;
    }

    .pick-summary-row {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }

    .pick-summary-row:last-child { border-bottom: none; }

    .pick-summary-info { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .pick-summary-country { font-weight: 700; color: var(--text-primary); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pick-summary-staff  { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pick-summary-next   { font-size: 10px; color: var(--text-secondary); }

    .pick-summary-right { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
    .pick-summary-pts  { font-weight: 800; font-size: 13px; color: var(--gold); font-variant-numeric: tabular-nums; }
    .pick-summary-form { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; }

    /* ── Click-to-expand breakdown ── */
    .leaderboard-row { flex-wrap: wrap; cursor: pointer; }
    .row-expand-arrow {
      font-size: 10px; color: var(--text-muted);
      transition: transform 0.2s; margin-left: 4px; flex-shrink: 0;
    }
    .leaderboard-row.expanded .row-expand-arrow { transform: rotate(180deg); }
    .row-breakdown {
      display: none; width: 100%; flex-basis: 100%;
      padding: 6px 14px 10px 54px;
      border-top: 1px solid var(--border); margin-top: 4px;
    }
    .leaderboard-row.expanded .row-breakdown { display: block; }
    .bd-row {
      display: flex; gap: 8px; align-items: center;
      font-size: 10px; padding: 2px 0;
    }
    .bd-opp   { flex: 1; color: var(--text-secondary); }
    .bd-score { color: var(--text-muted); }
    .bd-outcome { font-weight: 700; }
    .bd-outcome.w { color: var(--positive); }
    .bd-outcome.l { color: var(--negative); }
    .bd-outcome.d { color: var(--gold); }
    .bd-pts { font-weight: 800; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .bd-pts.pos  { color: var(--positive); }
    .bd-pts.neg  { color: var(--negative); }
    .bd-pts.zero { color: var(--text-muted); }
    .bd-empty { color: var(--text-muted); font-size: 10px; }

    /* ============================================================
       INTERACTIVE TOURNAMENT BRACKET
    ============================================================ */
    /* Round section */
    .bk-round-section { flex-shrink: 0; }
    .bk-round-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2px 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
    }
    .bk-round-name {
      font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--scarlet);
    }
    .bk-round-progress { font-size: 10px; color: var(--text-muted); }
    .bk-round-section.active-round .bk-round-name { color: var(--gold); }
    .bk-round-section.active-round .bk-round-header {
      border-color: rgba(255,215,0,0.25);
    }

    /* Match grid */
    .bk-match-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    }
    .bk-match-grid.single-col { grid-template-columns: 1fr; }

    /* Match card */
    .bk-match {
      background: var(--bg-panel-alt); border-radius: 8px;
      border: 1px solid var(--border); overflow: hidden;
      cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .bk-match:hover { border-color: rgba(255,255,255,0.15); box-shadow: 0 2px 12px rgba(0,0,0,0.35); }
    .bk-match.is-live  { border-color: rgba(0,230,118,0.4); box-shadow: 0 0 12px rgba(0,230,118,0.07); }
    .bk-match.is-final { border-color: rgba(255,215,0,0.45); box-shadow: 0 0 18px rgba(255,215,0,0.10); }
    .bk-match.is-champion { border-color: var(--gold); }

    /* Time strip */
    .bk-match-time {
      display: flex; align-items: center; justify-content: space-between;
      padding: 3px 9px; font-size: 9px; color: var(--text-muted);
      background: rgba(0,0,0,0.15); border-bottom: 1px solid var(--border);
    }
    .bk-live-badge { font-size: 8px; font-weight: 800; color: var(--live-green); letter-spacing: 0.5px; }
    .bk-expand-icon { font-size: 8px; color: var(--text-muted); transition: transform 0.2s; }
    .bk-match.expanded .bk-expand-icon { transform: rotate(180deg); }

    /* Team row */
    .bk-team {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 10px; border-bottom: 1px solid var(--border); min-width: 0;
    }
    .bk-team:last-of-type { border-bottom: none; }
    .bk-team.is-pick   { background: rgba(200,16,46,0.08); }
    .bk-team.winner    { background: rgba(0,200,83,0.06); }
    .bk-team.eliminated-team { opacity: 0.5; }

    .bk-team-flag { width: 20px; height: 15px; object-fit: cover; border-radius: 2px; flex-shrink: 0; }
    .bk-team-info { flex: 1; min-width: 0; }
    .bk-team-name {
      font-size: 11px; font-weight: 600; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bk-team-name.is-pick { color: #ff8fa3; }
    .bk-team-name.bk-tbd  { color: var(--text-muted); font-style: italic; font-weight: 400; }
    .bk-team-staff {
      font-size: 9px; color: var(--scarlet); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
    }
    .bk-team-score {
      font-size: 15px; font-weight: 900; color: var(--text-primary);
      font-variant-numeric: tabular-nums; flex-shrink: 0; min-width: 16px; text-align: right;
    }
    .bk-team-score.winner-score { color: var(--positive); }
    .bk-team-score.is-live      { color: var(--live-green); }
    .bk-team-score.tbd          { font-size: 10px; color: var(--text-muted); font-weight: 400; }

    /* Expandable events */
    .bk-match-details {
      display: none; padding: 7px 10px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.18); font-size: 10px;
    }
    .bk-match.expanded .bk-match-details { display: block; }
    .bk-event-row {
      display: flex; align-items: center; gap: 5px;
      padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .bk-event-row:last-child { border-bottom: none; }
    .bk-event-icon  { flex-shrink: 0; font-size: 10px; }
    .bk-event-time  { font-size: 9px; color: var(--text-muted); min-width: 24px; flex-shrink: 0; }
    .bk-event-player { color: var(--text-secondary); font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bk-event-team  { color: var(--text-muted); font-size: 9px; flex-shrink: 0; }
    .bk-no-events   { color: var(--text-muted); font-style: italic; }

    /* ── Round selector tabs ── */
    #bracket-round-tabs {
      display: flex; gap: 4px; padding: 6px 12px 8px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.12); overflow-x: auto; flex-shrink: 0;
    }
    .bk-tab {
      padding: 4px 11px; border-radius: 20px; font-size: 9px;
      font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px;
      border: 1px solid var(--border); color: var(--text-muted);
      background: transparent; cursor: pointer; white-space: nowrap;
      transition: all 0.18s; flex-shrink: 0;
    }
    .bk-tab:hover { border-color: rgba(255,255,255,0.18); color: var(--text-secondary); }
    .bk-tab.done  { border-color: rgba(0,200,83,0.3); color: rgba(0,200,83,0.75); }
    .bk-tab.live  { border-color: rgba(0,230,118,0.5); color: var(--live-green); }
    .bk-tab.active {
      background: var(--gold); border-color: var(--gold);
      color: #000; box-shadow: 0 0 10px rgba(255,215,0,0.25);
    }
    .bk-tab.done.active  { background: var(--positive); border-color: var(--positive); color: #000; }
    .bk-tab.live.active  { background: var(--live-green); border-color: var(--live-green); color: #000; }

    /* ── Eliminated leaderboard rows ── */
    .leaderboard-row.elim-row { opacity: 0.55; }
    .leaderboard-row.elim-row .row-name {
      text-decoration: line-through;
      text-decoration-color: rgba(255, 50, 80, 0.85);
      text-decoration-thickness: 2px;
      color: var(--text-muted);
    }
    .leaderboard-row.elim-row .row-flag-em { opacity: 0.45; }
    .leaderboard-row.elim-row .row-bar-fill { filter: saturate(0.15); opacity: 0.4; }
    .leaderboard-row.elim-row .row-bar-section { opacity: 0.5; }

    /* ── Winner gradient on bracket team row ── */
    .bk-team.winner {
      background: linear-gradient(90deg, rgba(0,200,83,0.12) 0%, transparent 80%);
    }

    /* ============================================================
       RESPONSIVE BREAKPOINTS
    ============================================================ */
    /* Medium desktop (1200px – 1599px) */
    @media (min-width: 1200px) and (max-width: 1599px) {
      #main { grid-template-columns: 44fr 56fr; }
      .leaderboard-row { grid-template-columns: 38px 1fr 130px 95px; }
      .row-country { display: none; }
      .row-name-sep { display: none; }
      .stage-badge { display: none; }
      .row-name { font-size: 15px; }
      .row-points { font-size: 17px; }
    }

    /* TV / Large Display (≥ 1600px) */
    @media (min-width: 1600px) {
      #main { grid-template-columns: 40fr 60fr; }
      .row-name     { font-size: 19px; }
      .row-points   { font-size: 23px; }
      #current-time { font-size: clamp(28px, 3.5vh, 42px); }
      #current-date { font-size: clamp(12px, 1.4vh, 15px); }
      .bk-team-name { font-size: 13px; }
      .bk-team-score { font-size: 17px; }
      .bk-team-staff { font-size: 10px; }
      .leaderboard-row { grid-template-columns: 48px 1fr 180px 120px; }
      .row-country { display: none; }
      .row-name-sep { display: none; }
    }

    /* Laptop (769px – 1199px) */
    @media (min-width: 769px) and (max-width: 1199px) {
      #main { grid-template-columns: 42fr 58fr; }
      .leaderboard-row { grid-template-columns: 36px 1fr 110px 85px; }
      .row-name     { font-size: 14px; }
      .row-points   { font-size: 16px; }
      .row-bar-section { padding: 0 8px; }
      .row-country { display: none; }
      .row-name-sep { display: none; }
      .stage-badge { display: none; }
      #current-time { font-size: clamp(16px, 2.8vh, 26px); }
      .header-title h1 { font-size: 17px; }
      .bk-match-grid { grid-template-columns: 1fr; }
      .bk-team-name  { font-size: 11px; }
    }

    /* Small desktop / tablet landscape (769px – 960px) */
    @media (min-width: 769px) and (max-width: 960px) {
      .leaderboard-row { grid-template-columns: 32px 1fr 100px 80px; }
      .row-name     { font-size: 13px; }
      .row-bar-section { display: none; }
    }

    /* Scrollbar hidden globally */
    ::-webkit-scrollbar { display: none; }

    /* ============================================================
       MOBILE LAYOUT (≤ 768px)
       The desktop #dashboard is hidden; #mob-view takes over with
       a single-column layout and a fixed bottom tab bar.
    ============================================================ */

    #mob-view { display: none; }

    @media (max-width: 768px) {
      html, body { height: auto; overflow-y: auto; overflow-x: hidden; }
      #dashboard { display: none !important; }

      #mob-view {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        background: var(--bg-base);
        color: var(--text-primary);
        font-family: var(--font);
        -webkit-font-smoothing: antialiased;
      }

      /* ── Sticky header ── */
      #mob-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        background: var(--bg-panel);
        border-bottom: 1px solid var(--border);
        border-left: 4px solid var(--scarlet);
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .mob-brand { display: flex; align-items: center; gap: 10px; }
      .mob-brand-icon {
        width: 34px; height: 34px;
        background: var(--scarlet); border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 17px; flex-shrink: 0;
      }
      .mob-brand-title { font-size: 13px; font-weight: 800; letter-spacing: -0.3px; }
      .mob-brand-sub   { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
      .mob-header-right { text-align: right; }
      .mob-header-day   { font-size: 10px; color: var(--text-muted); }
      .mob-header-day strong { color: var(--gold); font-size: 13px; }
      .mob-header-updated { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

      /* ── Tab panels ── */
      #mob-panels {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 12px 12px 82px;
      }
      .mob-panel { display: none; }
      .mob-panel.active { display: block; }

      /* ── Bottom tab bar ── */
      #mob-tab-bar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        display: flex;
        background: var(--bg-panel);
        border-top: 1px solid var(--border);
        z-index: 100;
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .mob-tab {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        padding: 9px 4px 7px;
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 10px;
        font-family: var(--font);
        cursor: pointer;
        transition: color 0.18s;
        -webkit-tap-highlight-color: transparent;
      }
      .mob-tab.active { color: var(--scarlet); }
      .mob-tab-icon { font-size: 20px; line-height: 1; }

      /* ── Section label ── */
      .mob-section-title {
        font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
        text-transform: uppercase; color: var(--text-muted);
        margin: 0 0 8px;
      }

      /* ── Leaderboard rows ── */
      .mob-lb-row {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 12px;
        background: var(--bg-panel);
        border-radius: var(--radius-md);
        margin-bottom: 6px;
        border: 1px solid var(--border);
      }
      .mob-lb-row.top3 { border-color: rgba(255,215,0,0.25); }
      .mob-lb-rank { width: 28px; text-align: center; font-size: 20px; flex-shrink: 0; line-height: 1; }
      .mob-lb-rank-num { font-size: 13px; font-weight: 700; color: var(--text-muted); }
      .mob-lb-info { flex: 1; min-width: 0; }
      .mob-lb-name {
        font-size: 13px; font-weight: 600;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .mob-lb-country { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
      .mob-lb-pts {
        font-size: 18px; font-weight: 800; color: var(--gold);
        font-variant-numeric: tabular-nums; flex-shrink: 0;
      }

      /* ── Match cards ── */
      .mob-match-card {
        background: var(--bg-panel);
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
        padding: 12px; margin-bottom: 8px;
      }
      .mob-match-card.is-live { border-color: rgba(0,230,118,0.4); }
      .mob-match-teams {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 8px; margin-bottom: 6px;
      }
      .mob-match-team {
        display: flex; align-items: center; gap: 5px;
        font-size: 11px; font-weight: 600; overflow: hidden;
      }

      .mob-group-stat { text-align: center; color: var(--text-muted); }
      .mob-group-pts  { text-align: center; font-weight: 700; color: var(--gold); }

      /* ── More tab ── */
      .mob-card {
        background: var(--bg-panel);
        border-radius: var(--radius-md); border: 1px solid var(--border);
        overflow: hidden; margin-bottom: 6px;
      }
      .mob-boot-row {
        display: flex; align-items: center; gap: 8px;
        padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 12px;
      }
      .mob-boot-row:last-child { border-bottom: none; }
      .mob-boot-player { flex: 1; font-weight: 500; }
      .mob-boot-goals  { font-weight: 700; color: var(--gold); flex-shrink: 0; }
      .mob-pick-row {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 12px; border-bottom: 1px solid var(--border);
      }
      .mob-pick-row:last-child { border-bottom: none; }
      .mob-pick-info { flex: 1; min-width: 0; }
      .mob-pick-country { font-size: 13px; font-weight: 700; }
      .mob-pick-staff   { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
      .mob-pick-pts { font-size: 16px; font-weight: 800; color: var(--gold); flex-shrink: 0; }

      /* ── Mobile Bracket ── */
      .mob-bracket-round { margin-bottom: 14px; }
      .mob-bracket-title {
        font-size: 11px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 1px; color: var(--scarlet); margin: 0 0 6px;
      }
      .mob-bracket-title.active { color: var(--gold); }
      .mob-bracket-round.active-round .mob-bracket-match { border-color: rgba(255,255,255,0.1); }
      .mob-bracket-row-score.winner { color: var(--positive); font-weight: 900; }
      .mob-bracket-row.winner { background: linear-gradient(90deg, rgba(0,200,83,0.1) 0%, transparent 80%); }
      .mob-bracket-match {
        background: var(--bg-panel); border-radius: var(--radius-md);
        border: 1px solid var(--border); overflow: hidden; margin-bottom: 6px;
      }
      .mob-bracket-match.is-live { border-color: rgba(0,230,118,0.4); }
      .mob-bracket-match.is-final { border-color: rgba(255,215,0,0.35); }
      .mob-bracket-row {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 12px;
      }
      .mob-bracket-row:last-child { border-bottom: none; }
      .mob-bracket-row.is-pick { background: rgba(200,16,46,0.07); }
      .mob-bracket-row.winner  { background: rgba(0,200,83,0.05); }
      .mob-bracket-row-name {
        flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .mob-bracket-row-name.is-pick { color: #ff8fa3; }
      .mob-bracket-row-score {
        font-weight: 800; font-variant-numeric: tabular-nums;
        color: var(--text-primary); flex-shrink: 0; min-width: 20px; text-align: right;

      .mob-bracket-row-score.is-live { color: var(--live-green); }
      .mob-bracket-row-score.tbd { color: var(--text-muted); font-weight: 400; font-size: 10px; }
    }
  </style>
</head>

    </nav>
