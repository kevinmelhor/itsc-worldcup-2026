<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!--
    Fixed 1920x1080 viewport. The browser is set to 1920x1080 fullscreen
    on the Mac mini, so we lock the viewport width here for consistent layout.
  -->
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>ITSC World Cup 2026 Challenge</title>

  <!-- Inter font from Google Fonts. Clean, modern, great on TV screens. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES (Design Tokens)
       Change these to retheme the entire dashboard.
    ============================================================ */
    :root {
      --bg-base:        #07070f;   /* Page background */
      --bg-panel:       #10101e;   /* Card/panel background */
      --bg-panel-alt:   #14142a;   /* Slightly lighter panel */
      --bg-row-even:    #12122050; /* Leaderboard even rows */
      --bg-row-hover:   #1e1e3a;   /* Leaderboard highlight */

      --scarlet:        #C8102E;   /* Rutgers Scarlet, primary accent */
      --scarlet-dim:    #8a0b1f;   /* Darker scarlet for subtle use */
      --gold:           #FFD700;   /* Gold, secondary accent */
      --gold-dim:       #b39800;

      --live-green:     #00e676;   /* Live match indicator */
      --positive:       #00c853;   /* Point gains */
      --negative:       #ff1744;   /* Point losses */
      --neutral:        #78909c;   /* Zero change */

      --text-primary:   #f0f0f8;
      --text-secondary: #9090b8;
      --text-muted:     #505070;

      --border:         rgba(255, 255, 255, 0.06);
      --border-accent:  rgba(200, 16, 46, 0.4);

      --font:           'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      --radius-sm:      6px;
      --radius-md:      10px;
      --radius-lg:      14px;

      /* Panel shadows for depth layering */
      --shadow-panel:   0 4px 24px rgba(0,0,0,0.6);
    }

    /* ============================================================
       RESET AND BASE
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================================
       ROOT DASHBOARD GRID
       Three rows: header, main content, country status bar
    ============================================================ */
    #dashboard {
      display: grid;
      grid-template-rows: 76px 1fr 164px;
      grid-template-areas:
        "header"
        "main"
        "statusbar";
      height: 1080px;
      width: 1920px;
      padding: 12px 20px 14px;
      gap: 10px;
      background:
        radial-gradient(ellipse 800px 400px at 0% 0%, rgba(200, 16, 46, 0.06) 0%, transparent 70%),
        radial-gradient(ellipse 600px 400px at 100% 100%, rgba(255, 215, 0, 0.03) 0%, transparent 70%);
    }

    /* ============================================================
       HEADER
    ============================================================ */
    #header {
      grid-area: header;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-panel);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 0 24px;
      box-shadow: var(--shadow-panel);
      border-left: 4px solid var(--scarlet);
      position: relative;
      overflow: hidden;
    }

    /* Subtle diagonal stripe in the header */
    #header::before {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 300px;
      background: linear-gradient(135deg, transparent 40%, rgba(200,16,46,0.04) 100%);
      pointer-events: none;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* World Cup trophy icon (Unicode ball) */
    .header-icon {
      width: 48px;
      height: 48px;
      background: var(--scarlet);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .header-title h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      line-height: 1.1;
    }

    .header-title p {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    #current-time {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    #current-date {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .tournament-badge {
      text-align: right;
    }

    .tournament-badge .day-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .tournament-badge .day-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--gold);
    }

    .refresh-status {
      text-align: right;
    }

    .refresh-status .refresh-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
    }

    .refresh-status .refresh-time {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* Flashes briefly on refresh */
    .refresh-flash {
      color: var(--live-green) !important;
    }

    /* ============================================================
       MAIN CONTENT AREA
       Two columns: leaderboard (wider) + right panel (narrower)
    ============================================================ */
    #main {
      grid-area: main;
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 10px;
      min-height: 0; /* Required for children to respect overflow */
    }

    /* ============================================================
       SHARED PANEL STYLES
    ============================================================ */
    .panel {
      background: var(--bg-panel);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-panel);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--scarlet);
    }

    .panel-subtitle {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ============================================================
       LEADERBOARD PANEL
    ============================================================ */
    #leaderboard-panel {
      min-height: 0;
    }

    #leaderboard-scroll {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #leaderboard-list {
      width: 100%;
      will-change: transform;
      transition: transform 0.8s ease-in-out;
    }

    .leaderboard-row {
      display: grid;
      /* Rank | Flag+Name+Country | Points | Today */
      grid-template-columns: 68px 1fr 210px 185px;
      align-items: center;
      padding: 0 20px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s ease;
    }

    .leaderboard-row:last-child {
      border-bottom: none;
    }

    .leaderboard-row:nth-child(even) {
      background: rgba(255,255,255,0.015);
    }

    /* Highlight live rows */
    .leaderboard-row.is-live {
      background: rgba(0, 230, 118, 0.05);
    }

    /* Top 3 get a special left border */
    .leaderboard-row.rank-1 { border-left: 3px solid var(--gold); }
    .leaderboard-row.rank-2 { border-left: 3px solid #c0c0c0; }
    .leaderboard-row.rank-3 { border-left: 3px solid #cd7f32; }

    .row-rank {
      font-size: 26px;
      font-weight: 900;
      color: var(--text-muted);
      text-align: center;
    }

    .row-rank.rank-1 { color: var(--gold); }
    .row-rank.rank-2 { color: #c0c0c0; }
    .row-rank.rank-3 { color: #cd7f32; }

    .row-identity {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .row-flag {
      width: 44px;
      height: 33px;
      object-fit: cover;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .row-flag-fallback {
      width: 44px;
      height: 33px;
      background: var(--bg-panel-alt);
      border-radius: 3px;
      flex-shrink: 0;
    }

    .row-name-group {
      min-width: 0;
    }

    .row-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-country {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 400;
      white-space: nowrap;
    }

    .row-live-badge {
      display: inline-block;
      background: var(--live-green);
      color: #000;
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 0.8px;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .row-points {
      text-align: right;
      font-size: 34px;
      font-weight: 800;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
    }

    .row-today {
      text-align: right;
      font-size: 17px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .row-today.positive { color: var(--positive); }
    .row-today.negative { color: var(--negative); }
    .row-today.zero     { color: var(--text-muted); }

    /* ============================================================
       RIGHT PANEL (matches + recent results, stacked vertically)
    ============================================================ */
    #right-panel {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      min-height: 0;
    }

    /* ============================================================
       MATCHES PANEL
    ============================================================ */
    #matches-list {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 16px;
    }

    .match-card {
      background: var(--bg-panel-alt);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      padding: 10px 14px;
      flex-shrink: 0;
    }

    /* Live match gets a green border and glow */
    .match-card.live {
      border-color: rgba(0, 230, 118, 0.35);
      background: rgba(0, 230, 118, 0.04);
      box-shadow: 0 0 16px rgba(0, 230, 118, 0.08);
    }

    .match-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .match-status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--live-green);
      animation: pulse-live 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-live {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .live-text { color: var(--live-green); }
    .upcoming-text { color: var(--text-muted); }

    .match-group-label {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .match-teams {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .match-team {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .match-team.away {
      flex-direction: row-reverse;
      text-align: right;
    }

    .match-team-flag {
      width: 28px;
      height: 21px;
      object-fit: cover;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .match-team-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .match-score-block {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .match-score {
      font-size: 26px;
      font-weight: 900;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      min-width: 22px;
      text-align: center;
    }

    .match-score-divider {
      font-size: 18px;
      font-weight: 300;
      color: var(--text-muted);
    }

    .match-kickoff {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .match-staff-row {
      margin-top: 6px;
      font-size: 10px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .staff-in-match {
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ============================================================
       RECENT RESULTS PANEL
    ============================================================ */
    #results-list {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 16px;
    }

    .result-card {
      background: var(--bg-panel-alt);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      padding: 8px 14px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .result-team {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .result-team.away {
      flex-direction: row-reverse;
    }

    .result-flag {
      width: 24px;
      height: 18px;
      object-fit: cover;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .result-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .result-score-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .result-score {
      font-size: 20px;
      font-weight: 900;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }

    .result-meta {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
    }

    /* ============================================================
       COUNTRY STATUS BAR
    ============================================================ */
    #statusbar {
      grid-area: statusbar;
      background: var(--bg-panel);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-panel);
      padding: 10px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .statusbar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .statusbar-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--scarlet);
    }

    .statusbar-legend {
      display: flex;
      gap: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .legend-dot.active   { background: var(--positive); }
    .legend-dot.live     { background: var(--live-green); animation: pulse-live 1.5s ease-in-out infinite; }
    .legend-dot.upcoming { background: var(--gold); }
    .legend-dot.none     { background: var(--text-muted); }

    #country-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-content: flex-start;
    }

    .country-tile {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-panel-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px 10px 4px 6px;
      flex-shrink: 0;
    }

    .country-tile.status-live {
      border-color: rgba(0, 230, 118, 0.4);
      background: rgba(0, 230, 118, 0.06);
    }

    .country-tile.status-active {
      border-color: rgba(0, 200, 83, 0.25);
    }

    .country-tile-flag {
      width: 24px;
      height: 18px;
      object-fit: cover;
      border-radius: 2px;
    }

    .country-tile-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .country-tile-pts {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      margin-left: 2px;
    }

    .country-tile-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-left: 2px;
    }

    .country-tile-dot.live     { background: var(--live-green); animation: pulse-live 1.5s ease-in-out infinite; }
    .country-tile-dot.active   { background: var(--positive); }
    .country-tile-dot.upcoming { background: var(--gold); }
    .country-tile-dot.none     { background: var(--text-muted); }

    /* ============================================================
       UTILITY AND ANIMATION
    ============================================================ */

    /* Fade in animation used on data refresh */
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fade-in 0.4s ease forwards;
    }

    /* Points change animation (flash green/red briefly) */
    @keyframes point-flash-pos {
      0%   { color: var(--text-primary); }
      30%  { color: var(--positive); }
      100% { color: var(--text-primary); }
    }

    @keyframes point-flash-neg {
      0%   { color: var(--text-primary); }
      30%  { color: var(--negative); }
      100% { color: var(--text-primary); }
    }

    .flash-positive { animation: point-flash-pos 1.2s ease forwards; }
    .flash-negative { animation: point-flash-neg 1.2s ease forwards; }

    /* Scrollbar hidden globally */
    ::-webkit-scrollbar { display: none; }
  </style>
</head>

<body>
  <div id="dashboard">

    <!-- ========================================================
         HEADER
    ======================================================== -->
    <header id="header">
      <div class="header-brand">
        <div class="header-icon">&#9917;</div>
        <div class="header-title">
          <h1>ITSC World Cup 2026 Challenge</h1>
          <p>Rutgers University Newark &nbsp;|&nbsp; IT Service Center</p>
        </div>
      </div>

      <div class="header-center">
        <div id="current-time">00:00 AM</div>
        <div id="current-date">Loading...</div>
      </div>

      <div class="header-right">
        <div class="tournament-badge">
          <div class="day-label">Tournament Day</div>
          <div class="day-value" id="tournament-day">1</div>
        </div>
        <div class="refresh-status">
          <div class="refresh-label">Last Updated</div>
          <div class="refresh-time" id="last-updated">Just now</div>
        </div>
      </div>
    </header>

    <!-- ========================================================
         MAIN CONTENT
    ======================================================== -->
    <main id="main">

      <!-- LEADERBOARD PANEL -->
      <div class="panel" id="leaderboard-panel">
        <div class="panel-header">
          <span class="panel-title">Leaderboard</span>
          <span class="panel-subtitle" id="leaderboard-count"></span>
        </div>
        <div id="leaderboard-scroll">
          <div id="leaderboard-list"></div>
        </div>
      </div>

      <!-- RIGHT PANEL: Matches + Results stacked -->
      <div id="right-panel">

        <!-- TODAY'S MATCHES -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Today's Matches</span>
            <span class="panel-subtitle" id="matches-subtitle"></span>
          </div>
          <div id="matches-list"></div>
        </div>

        <!-- RECENT RESULTS -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Recent Results</span>
            <span class="panel-subtitle">Last completed matches</span>
          </div>
          <div id="results-list"></div>
        </div>

      </div>
    </main>

    <!-- ========================================================
         COUNTRY STATUS BAR
    ======================================================== -->
    <div id="statusbar">
      <div class="statusbar-header">
        <span class="statusbar-title">Picked Countries</span>
        <div class="statusbar-legend">
          <div class="legend-item"><div class="legend-dot live"></div> Playing Now</div>
          <div class="legend-item"><div class="legend-dot active"></div> Active</div>
          <div class="legend-item"><div class="legend-dot upcoming"></div> Upcoming Today</div>
          <div class="legend-item"><div class="legend-dot none"></div> No Match Yet</div>
        </div>
      </div>
      <div id="country-grid"></div>
    </div>

  </div><!-- #dashboard -->

  <!-- Staff and match data -->
  <script src="data.js"></script>

  <script>
    /**
     * ITSC World Cup 2026 Dashboard
     *
     * Toggle USE_MOCK_DATA to switch between mock and live data.
     * Set your API key when going live.
     */

    // Live mode: pulling real data from the BALLDONTLIE API.
    const USE_MOCK_DATA = false;
    const API_KEY       = "b29f8214-03a4-4d75-8d1b-e2f2f46e40a3";
    const API_BASE      = "https://fifa.balldontlie.io";

    // How often to poll for new data (milliseconds)
    const REFRESH_INTERVAL_MS = 60 * 1000;

    // How fast the live match clock ticks for demo purposes (ms per minute)
    // Set to 60000 in production (real time). Set lower to see it move in demo.
    const LIVE_TICK_INTERVAL_MS = 15000;

    // ============================================================
    // STATE
    // All app state lives here in memory. No localStorage used.
    // ============================================================
    const state = {
      leaderboard:    [],
      matches:        [],
      countryPoints:  {},
      staffPicks:     [],
      liveMinute:     67,       // Mocked live match minute
      scrollOffset:   0,        // Current leaderboard scroll position in rows
      scrollDir:      1,        // 1 = down, -1 = up
      scrollPaused:   false,    // Pause scrolling at top/bottom
      lastUpdated:    new Date(),
    };

    // ============================================================
    // UTILITIES
    // ============================================================

    // Format a Date object as "HH:MM AM/PM"
    function formatTime(date) {
      let h = date.getHours();
      const m = String(date.getMinutes()).padStart(2, "0");
      const ampm = h >= 12 ? "PM" : "AM";
      h = h % 12 || 12;
      return `${h}:${m} ${ampm}`;
    }

    // Format a Date object as "Wednesday, June 14, 2026"
    function formatDate(date) {
      return date.toLocaleDateString("en-US", {
        weekday: "long",
        year:    "numeric",
        month:   "long",
        day:     "numeric",
      });
    }

    // Format a UTC ISO datetime as local kickoff time string ("3:00 PM")
    function formatKickoff(isoString) {
      const d = new Date(isoString);
      return formatTime(d);
    }

    // Return a flag <img> element string for a given flagCode
    function flagImg(flagCode, w = 32, h = 24, cssClass = "") {
      const src = `https://flagcdn.com/${w}x${h}/${flagCode}.png`;
      return `<img src="${src}" width="${w}" height="${h}" class="${cssClass}"
                   onerror="this.style.visibility='hidden'"
                   alt="" loading="lazy">`;
    }

    // Return "+N" or "-N" formatted today-change string
    function formatChange(n) {
      if (n > 0) return `+${n}`;
      if (n < 0) return `${n}`;
      return "0";
    }

    // Returns "positive", "negative", or "zero" for CSS class
    function changeClass(n) {
      if (n > 0) return "positive";
      if (n < 0) return "negative";
      return "zero";
    }

    // ============================================================
    // CLOCK
    // Updates the header clock every second.
    // ============================================================
    function startClock() {
      function tick() {
        const now  = new Date();
        document.getElementById("current-time").textContent = formatTime(now);
        document.getElementById("current-date").textContent = formatDate(now);
        document.getElementById("tournament-day").textContent = getTournamentDay();
      }
      tick();
      setInterval(tick, 1000);
    }

    // ============================================================
    // LIVE MATCH MINUTE TICKER
    // Increments the live match clock in mock mode for demo effect.
    // ============================================================
    function startLiveTicker() {
      setInterval(() => {
        state.liveMinute++;
        // Refresh the match display so the live minute updates
        renderMatches();
      }, LIVE_TICK_INTERVAL_MS);
    }

    // ============================================================
    // DATA LOADING
    // Loads mock or real data into state.
    // ============================================================
    async function loadData() {
      if (USE_MOCK_DATA) {
        // Use mock data from mock-data.js
        state.leaderboard   = MOCK_LEADERBOARD;
        state.matches       = MOCK_MATCHES;
        state.countryPoints = MOCK_COUNTRY_POINTS;
        state.staffPicks    = MOCK_STAFF_PICKS;
        return;
      }

      // --------------------------------------------------------
      // REAL API CALLS
      // Uncomment and complete these when going live.
      // --------------------------------------------------------
      try {
        const headers = { "Authorization": `Bearer ${API_KEY}` };

        // Fetch all games (add date filter for efficiency)
        const gamesRes  = await fetch(`${API_BASE}/fifa/worldcup/v1/games`, { headers });
        const gamesData = await gamesRes.json();
        state.matches = gamesData.data || [];

        // The leaderboard comes from the Apps Script output tab in Google Sheets.
        // Fetch it from a published Google Sheet URL (see docs/SETUP.md).
        // const lbRes  = await fetch("YOUR_PUBLISHED_SHEET_URL");
        // const lbData = await lbRes.json();
        // state.leaderboard = lbData;

      } catch (err) {
        console.error("API fetch failed:", err);
        // Keep showing whatever state was last loaded
      }
    }

    // ============================================================
    // RENDER: LEADERBOARD
    // ============================================================
    function renderLeaderboard() {
      const list = document.getElementById("leaderboard-list");
      const entries = state.leaderboard;

      document.getElementById("leaderboard-count").textContent =
        `${entries.length} participants`;

      list.innerHTML = entries.map((entry) => {
        const rankClass = entry.rank <= 3 ? `rank-${entry.rank}` : "";
        const liveClass = entry.isLive ? "is-live" : "";
        const liveBadge = entry.isLive
          ? `<span class="row-live-badge">LIVE</span>` : "";
        const change    = entry.todayPoints || 0;

        return `
          <div class="leaderboard-row ${rankClass} ${liveClass}">
            <div class="row-rank ${rankClass}">${entry.rank}</div>
            <div class="row-identity">
              ${flagImg(entry.countryCode, 44, 33, "row-flag")}
              <div class="row-name-group">
                <div class="row-name">${entry.name}${liveBadge}</div>
                <div class="row-country">${entry.country} &middot; Group ${entry.group}</div>
              </div>
            </div>
            <div class="row-points">${entry.points} <span style="font-size:13px;font-weight:400;color:var(--text-muted)">pts</span></div>
            <div class="row-today ${changeClass(change)}">${formatChange(change)} today</div>
          </div>`;
      }).join("");
    }

    // ============================================================
    // LEADERBOARD AUTO-SCROLL
    // Scrolls one row at a time every few seconds. Pauses at
    // the top and bottom. Returns to top after reaching the bottom.
    // ============================================================
    const ROW_HEIGHT       = 56;   // px, must match .leaderboard-row height
    const SCROLL_STEP_MS   = 3500; // how often to scroll one row
    const SCROLL_PAUSE_MS  = 2500; // pause duration at top and bottom

    function startLeaderboardScroll() {
      let isPaused = false;

      setInterval(() => {
        if (isPaused) return;

        const list       = document.getElementById("leaderboard-list");
        const scroll     = document.getElementById("leaderboard-scroll");
        const totalRows  = state.leaderboard.length;
        const visibleH   = scroll.clientHeight;
        const maxOffset  = Math.max(0, totalRows * ROW_HEIGHT - visibleH);

        if (maxOffset <= 0) return; // Everything fits, no need to scroll

        state.scrollOffset += ROW_HEIGHT * state.scrollDir;

        if (state.scrollOffset >= maxOffset) {
          // Reached bottom: clamp and pause, then reverse
          state.scrollOffset = maxOffset;
          isPaused = true;
          setTimeout(() => {
            state.scrollDir   = -1;
            isPaused = false;
          }, SCROLL_PAUSE_MS);
        } else if (state.scrollOffset <= 0) {
          // Reached top: clamp and pause, then go down again
          state.scrollOffset = 0;
          isPaused = true;
          setTimeout(() => {
            state.scrollDir   = 1;
            isPaused = false;
          }, SCROLL_PAUSE_MS);
        }

        list.style.transform = `translateY(-${state.scrollOffset}px)`;
      }, SCROLL_STEP_MS);
    }

    // ============================================================
    // RENDER: TODAY'S MATCHES
    // Shows live match first, then upcoming matches.
    // ============================================================
    function renderMatches() {
      const container = document.getElementById("matches-list");

      // Identify today's matches: live + scheduled
      const today = state.matches.filter(
        (m) => m.status === "live" || m.status === "scheduled"
      );

      document.getElementById("matches-subtitle").textContent =
        `${today.length} match${today.length !== 1 ? "es" : ""}`;

      if (today.length === 0) {
        container.innerHTML = `
          <div style="padding:24px;text-align:center;color:var(--text-muted);font-size:14px;">
            No more matches today
          </div>`;
        return;
      }

      container.innerHTML = today.map((match) => {
        const isLive  = match.status === "live";
        const minute  = isLive ? state.liveMinute : null;

        const homeStaff = getStaffForCountry(match.homeTeam.name);
        const awayStaff = getStaffForCountry(match.awayTeam.name);
        const allStaff  = [
          ...homeStaff.map((n) => `${n} (${match.homeTeam.code})`),
          ...awayStaff.map((n) => `${n} (${match.awayTeam.code})`),
        ];
        const staffLine = allStaff.length > 0
          ? `<div class="match-staff-row">Staff: <span class="staff-in-match">${allStaff.join(", ")}</span></div>`
          : "";

        let scoreBlock;
        if (isLive) {
          scoreBlock = `
            <div class="match-score-block">
              <div class="match-score">${match.homeScore}</div>
              <div class="match-score-divider">:</div>
              <div class="match-score">${match.awayScore}</div>
            </div>`;
        } else {
          const kickoff = formatKickoff(match.datetime);
          scoreBlock = `<div class="match-kickoff">${kickoff}</div>`;
        }

        let statusBlock;
        if (isLive) {
          statusBlock = `
            <div class="match-status-badge">
              <div class="live-dot"></div>
              <span class="live-text">LIVE ${minute}'</span>
            </div>`;
        } else {
          statusBlock = `
            <div class="match-status-badge">
              <span class="upcoming-text">TODAY</span>
            </div>`;
        }

        return `
          <div class="match-card ${isLive ? "live" : ""}">
            <div class="match-meta">
              ${statusBlock}
              <span class="match-group-label">GROUP ${match.group} &middot; MD${match.matchday}</span>
            </div>
            <div class="match-teams">
              <div class="match-team home">
                ${flagImg(match.homeTeam.flagCode, 28, 21, "match-team-flag")}
                <span class="match-team-name">${match.homeTeam.name}</span>
              </div>
              ${scoreBlock}
              <div class="match-team away">
                ${flagImg(match.awayTeam.flagCode, 28, 21, "match-team-flag")}
                <span class="match-team-name">${match.awayTeam.name}</span>
              </div>
            </div>
            ${staffLine}
          </div>`;
      }).join("");
    }

    // ============================================================
    // RENDER: RECENT RESULTS
    // Shows the last N completed matches.
    // ============================================================
    function renderResults() {
      const container = document.getElementById("results-list");

      const completed = state.matches
        .filter((m) => m.status === "completed")
        .slice(-5)  // Last 5 completed matches
        .reverse(); // Most recent first

      if (completed.length === 0) {
        container.innerHTML = `
          <div style="padding:24px;text-align:center;color:var(--text-muted);font-size:14px;">
            No results yet
          </div>`;
        return;
      }

      container.innerHTML = completed.map((match) => {
        const homeWon = match.homeScore > match.awayScore;
        const awayWon = match.awayScore > match.homeScore;

        return `
          <div class="result-card">
            <div class="result-team home">
              ${flagImg(match.homeTeam.flagCode, 24, 18, "result-flag")}
              <span class="result-name" style="${homeWon ? "color:var(--text-primary)" : "color:var(--text-secondary)"}">
                ${match.homeTeam.name}
              </span>
            </div>
            <div class="result-score-center">
              <div class="result-score">${match.homeScore} &ndash; ${match.awayScore}</div>
              <div class="result-meta">GRP ${match.group} &middot; FT</div>
            </div>
            <div class="result-team away">
              ${flagImg(match.awayTeam.flagCode, 24, 18, "result-flag")}
              <span class="result-name" style="${awayWon ? "color:var(--text-primary)" : "color:var(--text-secondary)"}">
                ${match.awayTeam.name}
              </span>
            </div>
          </div>`;
      }).join("");
    }

    // ============================================================
    // RENDER: COUNTRY STATUS BAR
    // Shows one tile per unique picked country.
    // ============================================================
    function renderCountryGrid() {
      const grid = document.getElementById("country-grid");

      // Deduplicate picked countries (preserve insertion order for consistency)
      const seen = new Set();
      const uniquePicks = state.staffPicks.filter((s) => {
        if (seen.has(s.country)) return false;
        seen.add(s.country);
        return true;
      });

      grid.innerHTML = uniquePicks.map((pick) => {
        const cp = state.countryPoints[pick.country] || { points: 0, isLive: false };

        // Determine if this country has an upcoming match today
        const hasUpcoming = state.matches.some(
          (m) =>
            m.status === "scheduled" &&
            (m.homeTeam.name === pick.country || m.awayTeam.name === pick.country)
        );

        let dotClass = "none";
        if (cp.isLive)       dotClass = "live";
        else if (cp.points > 0) dotClass = "active";
        else if (hasUpcoming)   dotClass = "upcoming";

        return `
          <div class="country-tile status-${dotClass}">
            ${flagImg(pick.countryCode, 24, 18, "country-tile-flag")}
            <span class="country-tile-name">${pick.country}</span>
            <span class="country-tile-pts">${cp.points}pts</span>
            <div class="country-tile-dot ${dotClass}"></div>
          </div>`;
      }).join("");
    }

    // ============================================================
    // MAIN RENDER
    // Called on initial load and after every refresh.
    // ============================================================
    function renderAll() {
      renderLeaderboard();
      renderMatches();
      renderResults();
      renderCountryGrid();

      // Update "last updated" timestamp
      state.lastUpdated = new Date();
      const el = document.getElementById("last-updated");
      el.textContent = formatTime(state.lastUpdated);
      el.classList.add("refresh-flash");
      setTimeout(() => el.classList.remove("refresh-flash"), 2000);
    }

    // ============================================================
    // REFRESH LOOP
    // Polls for new data on a set interval.
    // ============================================================
    async function refresh() {
      await loadData();
      renderAll();
    }

    // ============================================================
    // BOOT
    // ============================================================
    (async function boot() {
      startClock();
      await loadData();
      renderAll();
      startLeaderboardScroll();
      startLiveTicker();
      setInterval(refresh, REFRESH_INTERVAL_MS);
    })();
  </script>
</body>
</html>
