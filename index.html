  <!-- Staff and match data -->
  <script src="data.js"></script>

  <script>
    /**
     * ITSC World Cup 2026 Dashboard
     *
     * Live mode: pulls match data from the BALLDONTLIE API and calculates
     * points directly in the browser. No Apps Script needed for display.
     * Toggle USE_MOCK_DATA to fall back to data.js for testing.
     */

    const USE_MOCK_DATA = false;
    const API_KEY       = "b29f8214-03a4-4d75-8d1b-e2f2f46e40a3";
    const API_BASE      = "https://api.balldontlie.io";

    const REFRESH_INTERVAL_MS  = 60 * 1000;
    const LIVE_TICK_INTERVAL_MS = 15000; // Mock mode demo only

    // ============================================================
    // KNOCKOUT PHASE SWITCH
    // After KNOCKOUT_START_DATE the dashboard automatically replaces
    // the Group Standings panel with a Tournament Bracket panel.
    // Group stage ends July 2 2026; bracket view starts July 3.
    // ============================================================
    const KNOCKOUT_START_DATE = new Date("2026-06-27T00:00:00");

    function isKnockoutPhase() {
      return new Date() >= KNOCKOUT_START_DATE;
    }

    // Canonical round order for sorting bracket sections
    const KNOCKOUT_ROUND_ORDER = [
      "Round of 32", "Round of 16", "Quarter-finals",
      "Semi-finals", "Third Place Play-off", "Third Place",
      "Final",
    ];

    function getRoundSortKey(name) {
      if (!name) return 99;
      const n = name.toLowerCase();
      for (let i = 0; i < KNOCKOUT_ROUND_ORDER.length; i++) {
        if (n.includes(KNOCKOUT_ROUND_ORDER[i].toLowerCase())) return i;
      }
      return 99;
    }

    // ============================================================
    // FIFA COUNTRY CODE TO FLAG CODE MAPPING
    // Maps the API's 3-letter FIFA codes to 2-letter ISO codes
    // used by flagcdn.com for flag images.
    // ============================================================
    const FIFA_FLAG_CODES = {
      ALG: "dz", ARG: "ar", AUS: "au", AUT: "at", BEL: "be",
      BIH: "ba", BRA: "br", CPV: "cv", CAN: "ca", COL: "co",
      CIV: "ci", CRO: "hr", CUW: "cw", CZE: "cz", COD: "cd",
      ECU: "ec", EGY: "eg", ENG: "gb-eng", FRA: "fr", GER: "de",
      GHA: "gh", HAI: "ht", IRN: "ir", IRQ: "iq", JPN: "jp",
      JOR: "jo", MEX: "mx", MAR: "ma", NED: "nl", NZL: "nz",
      NOR: "no", PAN: "pa", PAR: "py", POR: "pt", QAT: "qa",
      KSA: "sa", SCO: "gb-sct", SEN: "sn", RSA: "za", KOR: "kr",
      ESP: "es", SWE: "se", SUI: "ch", TUN: "tn", TUR: "tr",
      URU: "uy", USA: "us", UZB: "uz",
    };

    function getFlagCode(countryCode) {
      return FIFA_FLAG_CODES[countryCode] || countryCode.toLowerCase().slice(0, 2);
    }

    // ============================================================
    // POINT VALUES (mirrors PointCalculator.gs)
    // ============================================================
    const POINTS = {
      GOAL: 4, OWN_GOAL: -1, YELLOW_CARD: -1, RED_CARD: -3,
      CLEAN_SHEET: 2, WIN: 3, DRAW: 1,
      ADVANCE_R16: 5, ADVANCE_QF: 10, ADVANCE_SF: 20,
      ADVANCE_FINAL: 35, WIN_FINAL: 50,
    };

    // ============================================================
    // STATE
    // All app state lives here in memory. No localStorage used.
    // ============================================================
    const state = {
      leaderboard:          [],
      matches:              [],
      countryPoints:        {},
      staffPicks:           [],
      groupInfo:            {},  // country name -> group letter (e.g. "A")
      groupStandings:       [], // raw standing rows from API
      liveMinute:           67, // Mock mode only
      lastUpdated:          new Date(),
      selectedBracketRound: null,   // null = auto (active round)
      _bracketUserSelected: false,  // true when user manually clicked a tab
    };

    // ============================================================
    // UTILITIES
    // ============================================================

    function formatTime(date) {
      let h = date.getHours();
      const m = String(date.getMinutes()).padStart(2, "0");
      const ampm = h >= 12 ? "PM" : "AM";
      h = h % 12 || 12;
      return `${h}:${m} ${ampm}`;
    }

    function formatDate(date) {
      return date.toLocaleDateString("en-US", {
        weekday: "long", year: "numeric", month: "long", day: "numeric",
      });
    }

    function formatKickoff(isoString) {
      return formatTime(new Date(isoString));
    }

    // Returns first names of staff who picked a given country
    function getStaffForCountry(countryName) {
      return state.staffPicks
        .filter(p => p.country === countryName)
        .map(p => p.name.split(" ")[0]);
    }

    // Returns tournament day number (Day 1 = June 11 2026)
    function getTournamentDay() {
      const start = new Date("2026-06-11T00:00:00");
      const diff  = Math.floor((Date.now() - start.getTime()) / 86400000);
      return Math.max(1, diff + 1);
    }

    // Converts a 2-letter ISO code to a flag emoji (e.g. "mx" → 🇲🇽)
    function flagEmoji(code) {
      if (!code) return "";
      const c = code.toLowerCase();
      if (c === "gb-eng") return "🏴󠁧󠁢󠁥󠁮󠁧󠁿";
      if (c === "gb-sct") return "🏴󠁧󠁢󠁳󠁣󠁴󠁿";
      return [...c.toUpperCase()].map(ch =>
        String.fromCodePoint(0x1F1E6 + ch.charCodeAt(0) - 65)
      ).join("");
    }

    function flagImg(flagCode, w = 32, h = 24, cssClass = "") {
      const src = `https://flagcdn.com/${w}x${h}/${flagCode}.png`;
      return `<img src="${src}" width="${w}" height="${h}" class="${cssClass}"
                   onerror="this.style.visibility='hidden'" alt="" loading="lazy">`;
    }

    function formatChange(n) {
      if (n > 0) return `+${n}`;
      if (n < 0) return `${n}`;
      return "0";
    }

    function changeClass(n) {
      if (n > 0) return "positive";
      if (n < 0) return "negative";
      return "zero";
    }

    // Returns true if two Date objects fall on the same calendar day (local time)
    function isSameDay(a, b) {
      return a.getFullYear() === b.getFullYear() &&
             a.getMonth()    === b.getMonth()    &&
             a.getDate()     === b.getDate();
    }

    // ============================================================
    // CLOCK
    // ============================================================
    function startClock() {
      function tick() {
        const now = new Date();
        document.getElementById("current-time").textContent = formatTime(now);
        document.getElementById("current-date").textContent = formatDate(now);
        document.getElementById("tournament-day").textContent = getTournamentDay();
      }
      tick();
      setInterval(tick, 1000);
    }

    // ============================================================
    // LIVE MATCH MINUTE TICKER (mock mode demo only)
    // ============================================================
    function startLiveTicker() {
      if (USE_MOCK_DATA) {
        setInterval(() => { state.liveMinute++; renderMatches(); }, LIVE_TICK_INTERVAL_MS);
      }
    }

    // ============================================================
    // API NORMALIZATION HELPERS
    // ============================================================

    // Returns true if the API status string means the match is in progress
    function isLiveStatus(s) {
      if (!s) return false;
      const l = s.toLowerCase();
      return l === "in_progress" || l === "live" || l === "1h" ||
             l === "ht" || l === "2h" || l === "et" || l === "pen" ||
             /^\d+$/.test(l);
    }

    // Returns true if the API status string means the match is finished
    function isCompletedStatus(s) {
      if (!s) return false;
      const l = s.toLowerCase();
      return l === "completed" || l === "final" || l === "ft" ||
             l === "finished" || l === "aet" || l === "ap";
    }

    // Converts an API match object into our internal match format
    function normalizeMatch(m) {
      let status = "scheduled";
      if (isLiveStatus(m.status))      status = "live";
      if (isCompletedStatus(m.status)) status = "completed";

      const homeCode   = m.home_team?.country_code || "";
      const awayCode   = m.away_team?.country_code || "";
      const groupLetter = (m.group?.name || "").replace("Group ", "").trim();
      // Knockout round name (e.g. "Round of 16", "Quarter-finals", "Final")
      const roundName   = m.stage?.name || m.round?.name || "";

      return {
        id:        m.id,
        group:     groupLetter,
        round:     roundName,
        matchday:  m.round_number || 1,
        status,
        rawStatus: m.status,
        datetime:  m.datetime,
        venue:     m.stadium?.name || "",
        homeTeam: {
          id:       m.home_team?.id,
          name:     m.home_team?.name || "",
          code:     m.home_team?.abbreviation || homeCode,
          flagCode: getFlagCode(homeCode),
        },
        awayTeam: {
          id:       m.away_team?.id,
          name:     m.away_team?.name || "",
          code:     m.away_team?.abbreviation || awayCode,
          flagCode: getFlagCode(awayCode),
        },
        homeScore:      m.home_score,
        awayScore:      m.away_score,
        // Penalty shootout scores (null if match didn't go to penalties)
        homePenalties:  m.home_score_penalties ?? m.home_penalties ?? null,
        awayPenalties:  m.away_score_penalties ?? m.away_penalties ?? null,
        events:         [],
      };
    }

    // Converts an API event into our internal event format.
    // The BALLDONTLIE API uses incident_type, incident_class, time_minute, is_home.
    function normalizeEvent(e, match) {
      const side = e.is_home ? "home" : "away";

      const incType  = (e.incident_type  || e.type  || "").toLowerCase();
      const incClass = (e.incident_class || "").toLowerCase();

      let type;
      if (incType === "goal") {
        if (incClass.includes("shootout")) {
          type = "shootout_goal"; // penalty shootout — no points awarded
        } else if (incClass === "own_goal" || incClass === "own goal") {
          type = "own_goal";
        } else {
          type = "goal";
        }
      } else if (incType === "card") {
        if (incClass === "red" || incClass === "red_card" || incClass === "red card") {
          type = "red_card";
        } else if (incClass === "yellowred" || incClass === "yellow_red") {
          type = "red_card"; // second yellow = red
        } else {
          type = "yellow_card";
        }
      } else {
        // Fallback: handle legacy field names just in case
        type = incType.replace(/\s+/g, "_");
      }

      return {
        type,
        team:   side,
        player: e.player?.name || e.player?.short_name || "",
        minute: e.time_minute  || e.minute || 0,
      };
    }

    // ============================================================
    // POINT CALCULATION (runs in the browser from API data)
    // ============================================================

    // Returns the one-time advancement bonus for winning a knockout round.
    function getAdvancementBonus(roundName) {
      if (!roundName) return 0;
      const n = roundName.toLowerCase();
      if (n.includes("round of 32"))  return POINTS.ADVANCE_R16;
      if (n.includes("round of 16"))  return POINTS.ADVANCE_QF;
      if (n.includes("quarter"))      return POINTS.ADVANCE_SF;
      if (n.includes("semi"))         return POINTS.ADVANCE_FINAL;
      // "Final" but NOT "semi-final" or "third place"
      if (n.includes("final") && !n.includes("semi") && !n.includes("third")) return POINTS.WIN_FINAL;
      return 0;
    }

    function getEventPoints(type) {
      switch (type) {
        case "goal":        return POINTS.GOAL;
        case "own_goal":    return POINTS.OWN_GOAL;
        case "yellow_card": return POINTS.YELLOW_CARD;
        case "red_card":    return POINTS.RED_CARD;
        default:            return null;
      }
    }

    function calculateMatchPoints(match) {
      let hp = 0, ap = 0;

      // Event-based points (goals, cards, own goals) counted as they happen
      for (const e of (match.events || [])) {
        const pts = getEventPoints(e.type);
        if (pts === null) continue;
        if (e.team === "home") hp += pts;
        else                   ap += pts;
      }

      // Win/draw and clean sheet are always applied based on current score —
      // during live play this reflects "points if the game ended right now",
      // so there's no sudden jump when the match completes.
      const hs = match.homeScore || 0;
      const as = match.awayScore || 0;
      if (hs > as)      { hp += POINTS.WIN; }
      else if (as > hs) { ap += POINTS.WIN; }
      else              { hp += POINTS.DRAW; ap += POINTS.DRAW; }
      if (as === 0) hp += POINTS.CLEAN_SHEET;
      if (hs === 0) ap += POINTS.CLEAN_SHEET;

      return { homePoints: hp, awayPoints: ap };
    }

    function calculateCountryPoints(matches) {
      const cp = {};

      function init(name) {
        if (!cp[name]) cp[name] = { points: 0, isLive: false, wins: 0, draws: 0, losses: 0, played: 0, goalsFor: 0, yellowCards: 0, redCards: 0, ownGoals: 0, cleanSheets: 0 };
      }

      for (const m of matches) {
        if (m.status !== "completed" && m.status !== "live") continue;
        if (!m.homeTeam.name || !m.awayTeam.name) continue;

        init(m.homeTeam.name);
        init(m.awayTeam.name);

        const result = calculateMatchPoints(m);
        cp[m.homeTeam.name].points += result.homePoints;
        cp[m.awayTeam.name].points += result.awayPoints;

        if (m.status === "live") {
          cp[m.homeTeam.name].isLive = true;
          cp[m.awayTeam.name].isLive = true;
        }

        for (const e of (m.events || [])) {
          if (e.type === "yellow_card") {
            if (e.team === "home") cp[m.homeTeam.name].yellowCards++;
            else                   cp[m.awayTeam.name].yellowCards++;
          } else if (e.type === "red_card") {
            if (e.team === "home") cp[m.homeTeam.name].redCards++;
            else                   cp[m.awayTeam.name].redCards++;
          } else if (e.type === "own_goal") {
            if (e.team === "home") cp[m.homeTeam.name].ownGoals++;
            else                   cp[m.awayTeam.name].ownGoals++;
          }
        }

        if (m.status === "completed") {
          const hs = m.homeScore || 0;
          const as = m.awayScore || 0;
          cp[m.homeTeam.name].played++;
          cp[m.awayTeam.name].played++;
          cp[m.homeTeam.name].goalsFor += hs;
          cp[m.awayTeam.name].goalsFor += as;
          if (hs > as) {
            cp[m.homeTeam.name].wins++;
            cp[m.awayTeam.name].losses++;
          } else if (as > hs) {
            cp[m.awayTeam.name].wins++;
            cp[m.homeTeam.name].losses++;
          } else {
            cp[m.homeTeam.name].draws++;
            cp[m.awayTeam.name].draws++;
          }
          if (as === 0) cp[m.homeTeam.name].cleanSheets++;
          if (hs === 0) cp[m.awayTeam.name].cleanSheets++;
        }
      }
      // ---- Knockout advancement bonuses ----
      // Post-process completed knockout matches (no group letter) to:
      //   1. Fix matches decided by penalties — swap DRAW points to WIN for actual winner
      //   2. Award the one-time round advancement bonus to the winner
      for (const m of matches) {
        if (m.status !== "completed" || m.group) continue;
        if (!m.round) continue;

        const hName = m.homeTeam?.name;
        const aName = m.awayTeam?.name;
        if (!hName || !aName || !cp[hName] || !cp[aName]) continue;

        const hs = m.homeScore || 0;
        const as = m.awayScore || 0;
        let winnerName = null;

        if (hs > as) {
          winnerName = hName;
        } else if (as > hs) {
          winnerName = aName;
        } else {
          // Tied at full time — check penalty scores
          const hp = m.homePenalties;
          const ap = m.awayPenalties;
          if (hp != null && ap != null && hp !== ap) {
            winnerName = hp > ap ? hName : aName;
            const loserName = hp > ap ? aName : hName;
            // Correct the DRAW (+1) that calculateMatchPoints already gave both teams
            cp[hName].points -= POINTS.DRAW;
            cp[aName].points -= POINTS.DRAW;
            cp[winnerName].points += POINTS.WIN;
          }
        }

        if (winnerName) {
          const bonus = getAdvancementBonus(m.round);
          if (bonus > 0) cp[winnerName].points += bonus;
        }
      }

      return cp;
    }

    // ============================================================
    // KNOCKOUT STAGE HELPERS
    // ============================================================

    // Returns abbreviated round label for stage badges
    function abbreviateRound(roundName) {
      if (!roundName) return "";
      const n = roundName.toLowerCase();
      if (n.includes("32"))    return "R32";
      if (n.includes("16"))    return "R16";
      if (n.includes("quarter")) return "QF";
      if (n.includes("third"))   return "3rd";
      if (n.includes("semi"))    return "SF";
      if (n.includes("final"))   return "FIN";
      return roundName.slice(0, 3).toUpperCase();
    }

    // Returns { isAlive, stage } for a country in the knockout stage.
    // isAlive = true  → country is still in the tournament
    // isAlive = false → country lost a knockout match OR never qualified
    // stage = abbreviated round name (e.g. "R16") or null if not in knockout
    function getCountryTournamentStatus(countryName) {
      const koMatches = state.matches.filter(m =>
        !m.group &&
        (m.homeTeam?.name === countryName || m.awayTeam?.name === countryName)
      );
      if (!koMatches.length) return { isAlive: false, stage: null };

      for (const m of koMatches) {
        if (m.status !== "completed") continue;
        const isHome  = m.homeTeam?.name === countryName;
        const myScore  = isHome ? (m.homeScore || 0) : (m.awayScore || 0);
        const oppScore = isHome ? (m.awayScore || 0) : (m.homeScore || 0);
        let lost = myScore < oppScore;
        if (!lost && myScore === oppScore) {
          const myPen  = isHome ? m.homePenalties : m.awayPenalties;
          const oppPen = isHome ? m.awayPenalties : m.homePenalties;
          if (myPen != null && oppPen != null && myPen < oppPen) lost = true;
        }
        if (lost) return { isAlive: false, stage: abbreviateRound(m.round) || "OUT" };
      }

      // Still alive — find furthest scheduled or live match
      const upcoming = koMatches.find(m => m.status === "scheduled" || m.status === "live");
      const latestCompleted = koMatches.filter(m => m.status === "completed")
        .sort((a, b) => getRoundSortKey(b.round) - getRoundSortKey(a.round))[0];
      const stage = abbreviateRound((upcoming || latestCompleted)?.round || "");
      return { isAlive: true, stage };
    }

    // Returns max possible challenge points a country can still earn
    // from advancement bonuses (does not include unpredictable goal/card points).
    function getMaxPossiblePoints(countryName, currentPoints, koStatus) {
      if (!koStatus.isAlive) return currentPoints;
      const nextMatch = state.matches.find(m =>
        !m.group && m.status !== "completed" &&
        (m.homeTeam?.name === countryName || m.awayTeam?.name === countryName)
      );
      if (!nextMatch) return currentPoints;
      const roundKey = getRoundSortKey(nextMatch.round || "");
      const bonusMap = {
        "Round of 32":    POINTS.ADVANCE_R16,
        "Round of 16":    POINTS.ADVANCE_QF,
        "Quarter-finals": POINTS.ADVANCE_SF,
        "Semi-finals":    POINTS.ADVANCE_FINAL,
        "Final":          POINTS.WIN_FINAL,
      };
      let bonus = 0;
      for (const [round, b] of Object.entries(bonusMap)) {
        if (getRoundSortKey(round) >= roundKey) bonus += b;
      }
      return currentPoints + bonus;
    }

    function buildLeaderboard(staffPicks, countryPoints) {
      const today = new Date();

      // Pre-compute today's points per country from today's active matches
      const todayCountryPts = {};
      for (const m of state.matches) {
        if (!isSameDay(new Date(m.datetime), today)) continue;
        if (m.status !== "live" && m.status !== "completed") continue;
        const result = calculateMatchPoints(m);
        const h = m.homeTeam?.name, a = m.awayTeam?.name;
        if (h) todayCountryPts[h] = (todayCountryPts[h] || 0) + result.homePoints;
        if (a) todayCountryPts[a] = (todayCountryPts[a] || 0) + result.awayPoints;
      }

      const entries = staffPicks.map(pick => {
        const cp  = countryPoints[pick.country] || { points: 0, isLive: false, wins: 0, draws: 0, losses: 0, played: 0, goalsFor: 0, yellowCards: 0, redCards: 0, cleanSheets: 0 };
        const koStatus = getCountryTournamentStatus(pick.country);
        const maxPossible = getMaxPossiblePoints(pick.country, cp.points, koStatus);

        const hasMatchToday = cp.isLive || state.matches.some(m =>
          m.status === "scheduled" &&
          isSameDay(new Date(m.datetime), today) &&
          (m.homeTeam.name === pick.country || m.awayTeam.name === pick.country)
        );

        return {
          name:          pick.name,
          country:       pick.country,
          countryCode:   pick.countryCode,
          points:        cp.points,
          todayPoints:   todayCountryPts[pick.country] || 0,
          isLive:        cp.isLive,
          wins:          cp.wins        || 0,
          draws:         cp.draws       || 0,
          losses:        cp.losses      || 0,
          played:        cp.played      || 0,
          goalsFor:      cp.goalsFor    || 0,
          yellowCards:   cp.yellowCards || 0,
          redCards:      cp.redCards    || 0,
          cleanSheets:   cp.cleanSheets || 0,
          ownGoals:      cp.ownGoals    || 0,
          hasMatchToday,
          isAlive:       koStatus.isAlive,
          koStage:       koStatus.stage,
          maxPossible,
        };
      });

      entries.sort((a, b) => b.points !== a.points
        ? b.points - a.points
        : a.name.localeCompare(b.name));

      let rank = 1;
      entries.forEach((e, i) => {
        if (i > 0 && e.points < entries[i - 1].points) rank = i + 1;
        e.rank = rank;
      });

      return entries;
    }

    // ============================================================
    // API FETCH HELPERS
    // ============================================================

    // Fetches all matches using cursor-based pagination
    async function fetchAllMatchesFromAPI(headers) {
      const all = [];
      let cursor = null;
      let pageCount = 0;
      do {
        const url = `${API_BASE}/fifa/worldcup/v1/matches?per_page=100` +
                    (cursor ? `&cursor=${cursor}` : "");
        const res  = await fetch(url, { headers });
        if (!res.ok) throw new Error(`Matches API error: ${res.status}`);
        const data = await res.json();
        all.push(...(data.data || []));
        cursor = data.meta?.next_cursor || null;
        pageCount++;
        if (pageCount >= 15) break; // safety limit
      } while (cursor);
      return all;
    }

    // Fetches events for a list of match IDs, returns a map of matchId -> events[]
    async function fetchMatchEventsFromAPI(matchIds, headers) {
      const eventsMap = {};
      if (!matchIds.length) return eventsMap;
      // Batch in chunks of 20 to avoid very long URLs
      for (let i = 0; i < matchIds.length; i += 20) {
        const chunk = matchIds.slice(i, i + 20);
        const baseQs = chunk.map(id => `match_ids[]=${id}`).join("&");
        // Paginate through all events for this batch
        let cursor = null;
        let pageCount = 0;
        do {
          const cursorQs = cursor ? `&cursor=${cursor}` : "";
          const res  = await fetch(`${API_BASE}/fifa/worldcup/v1/match_events?${baseQs}&per_page=100${cursorQs}`, { headers });
          if (!res.ok) throw new Error(`Events API error: ${res.status}`);
          const data = await res.json();
          for (const e of (data.data || [])) {
            if (!eventsMap[e.match_id]) eventsMap[e.match_id] = [];
            eventsMap[e.match_id].push(e);
          }
          cursor = data.meta?.next_cursor || null;
          pageCount++;
          if (pageCount >= 5) break; // safety limit per batch
        } while (cursor);
      }
      return eventsMap;
    }

    // Fetches group standings from API.
    // Returns { groupInfo, standings } where:
    //   groupInfo: country name -> group letter
    //   standings: raw array of standing rows
    async function fetchGroupInfoFromAPI(headers) {
      const res  = await fetch(`${API_BASE}/fifa/worldcup/v1/group_standings?per_page=100`, { headers });
      const data = await res.json();
      const rows = data.data || [];
      const info = {};
      for (const row of rows) {
        const name  = row.team?.name;
        const group = (row.group?.name || "").replace("Group ", "").trim();
        if (name) info[name] = group;
      }
      return { groupInfo: info, standings: rows };
    }

    // ============================================================
    // DATA LOADING
    // ============================================================
    async function loadData() {
      if (USE_MOCK_DATA) {
        state.leaderboard   = MOCK_LEADERBOARD;
        state.matches       = MOCK_MATCHES;
        state.countryPoints = MOCK_COUNTRY_POINTS;
        state.staffPicks    = STAFF_PICKS;
        return;
      }

      try {
        const headers = { "Authorization": `Bearer ${API_KEY}` };

        // Fetch group standings and all matches in parallel
        const [gResult, rawMatches] = await Promise.all([
          fetchGroupInfoFromAPI(headers),
          fetchAllMatchesFromAPI(headers),
        ]);

        // Guard: if API returned no matches (auth error, rate limit, etc.),
        // keep the previous state rather than wiping the leaderboard to zeros.
        if (!rawMatches.length) {
          console.warn("API returned 0 matches — keeping previous data");
          return;
        }

        // Build everything into local variables first.
        // State is only updated at the very end so a mid-fetch failure
        // leaves the displayed leaderboard untouched.
        const newMatches = rawMatches.map(normalizeMatch);

        // Events for completed and live matches only
        const activeIds = newMatches
          .filter(m => m.status === "completed" || m.status === "live")
          .map(m => m.id);
        const eventsMap = await fetchMatchEventsFromAPI(activeIds, headers);

        // Attach normalized events to each match
        newMatches.forEach(m => {
          m.events = (eventsMap[m.id] || []).map(e => normalizeEvent(e, m));
        });

        // Calculate points and build leaderboard from fresh data
        const newCountryPoints = calculateCountryPoints(newMatches);
        const newLeaderboard   = buildLeaderboard(STAFF_PICKS, newCountryPoints);

        // All steps succeeded — update state atomically
        state.groupInfo      = gResult.groupInfo;
        state.groupStandings = gResult.standings;
        state.matches        = newMatches;
        state.countryPoints  = newCountryPoints;
        state.staffPicks     = STAFF_PICKS;
        state.leaderboard    = newLeaderboard;

      } catch (err) {
        console.error("API fetch failed:", err);
        // Keep showing whatever state was last successfully loaded
      }
    }

    // ============================================================
    // RENDER: LEADERBOARD
    // ============================================================
    function renderLeaderboard() {
      const list    = document.getElementById("leaderboard-list");
      const entries = state.leaderboard;

      document.getElementById("leaderboard-count").textContent =
        `${entries.length} participants`;

      // Survival count in header
      const aliveCount = entries.filter(e => e.isAlive).length;
      const survEl = document.getElementById("survival-count");
      if (survEl) {
        if (isKnockoutPhase() && entries.some(e => e.koStage)) {
          survEl.innerHTML = `<strong>${aliveCount}</strong> of ${entries.length} still alive`;
        } else {
          survEl.innerHTML = "";
        }
      }

      const maxPoints    = Math.max(...entries.map(e => e.points), 1);
      const uniquePoints = [...new Set(entries.map(e => e.points))].sort((a, b) => b - a);

      list.innerHTML = entries.map((entry) => {
        const tier      = uniquePoints.indexOf(entry.points) + 1;
        const rankClass = tier <= 3 ? `rank-${tier}` : "";
        const liveClass = entry.isLive ? "is-live" : "";
        const change    = entry.todayPoints || 0;

        const barPct   = Math.max(Math.round((entry.points / maxPoints) * 100), entry.points > 0 ? 2 : 0);
        const barClass = tier === 1 ? "rank-1" : tier === 2 ? "rank-2" : tier === 3 ? "rank-3" : "rank-other";

        // Alive dot + stage badge
        const inKnockout = isKnockoutPhase() && entry.koStage;
        const aliveDotClass = !inKnockout ? "not-in" : entry.isAlive ? "alive" : "eliminated";
        const aliveDot = `<div class="alive-dot ${aliveDotClass}"></div>`;
        const stageBadgeClass = !inKnockout ? "not-in" : entry.isAlive ? "alive" : "eliminated";
        const stageBadgeText  = entry.koStage || "";
        const stageBadge = stageBadgeText
          ? `<span class="stage-badge ${stageBadgeClass}">${stageBadgeText}</span>` : "";

        const liveBadge = entry.isLive ? `<span class="row-live-badge">LIVE</span>` : "";
        const todayBadge = entry.hasMatchToday && !entry.isLive
          ? `<span class="row-plays-today">⚽ TODAY</span>` : "";

        const cardLine = (entry.yellowCards > 0 || entry.redCards > 0 || entry.ownGoals > 0)
          ? `<span style="color:var(--text-muted)">·</span>
             ${entry.yellowCards > 0 ? `<span title="Yellow cards">🟨 ${entry.yellowCards}</span>` : ""}
             ${entry.redCards    > 0 ? `<span title="Red cards">🟥 ${entry.redCards}</span>`       : ""}
             ${entry.ownGoals    > 0 ? `<span title="Own goals">↩️ ${entry.ownGoals}</span>`       : ""}`
          : "";

        const cleanSheetLine = entry.cleanSheets > 0
          ? `<span style="color:var(--text-muted)">·</span><span title="Clean sheets">🧤 ${entry.cleanSheets}</span>`
          : "";

        const record = entry.played > 0
          ? `<span class="row-record">
               <span class="row-record-item w">W${entry.wins}</span>
               <span class="row-record-item d">D${entry.draws}</span>
               <span class="row-record-item l">L${entry.losses}</span>
             </span>
             <span style="color:var(--text-muted)">·</span>
             <span style="color:var(--text-muted)">⚽ ${entry.goalsFor}</span>
             ${cleanSheetLine}${cardLine}${todayBadge}`
          : `${todayBadge}`;

        const todayLine = change !== 0
          ? `<div class="row-today ${changeClass(change)}">${change > 0 ? "+" : ""}${change} today</div>`
          : `<div class="row-today zero">—</div>`;

        return `
          <div class="leaderboard-row ${rankClass} ${liveClass}${(!entry.isAlive && isKnockoutPhase() && entry.koStage !== null) ? " elim-row" : ""}">
            <div class="row-rank ${rankClass}">${entry.rank}</div>
            <div class="row-identity">
              ${aliveDot}
              ${flagImg(entry.countryCode, 30, 22, "row-flag")}
              <div class="row-name-line">
                <span class="row-flag-em">${flagEmoji(entry.countryCode)}</span>
                <span class="row-name">${entry.name}</span>
                ${liveBadge}${stageBadge}
                <span class="row-name-sep">·</span>
                <span class="row-country">${flagEmoji(entry.countryCode)} ${entry.country}</span>
                <span class="row-expand-arrow">▾</span>
              </div>
            </div>
            <div class="row-bar-section">
              <div class="row-bar-track">
                <div class="row-bar-fill ${barClass}" style="width:${barPct}%"></div>
              </div>
              <div class="row-stats-line">${record}</div>
            </div>
            <div class="row-points-section">
              <div class="row-points"><span class="pts-num" data-v="${entry.points}">0</span><span style="font-size:11px;font-weight:400;color:var(--text-muted);margin-left:2px">pts</span></div>
              ${todayLine}
            </div>
            ${(function() {
              const mbd = state.matches
                .filter(function(m) {
                  return (m.status === "completed" || m.status === "live") &&
                    ((m.homeTeam && m.homeTeam.name === entry.country) ||
                     (m.awayTeam && m.awayTeam.name === entry.country));
                })
                .map(function(m) {
                  const isH  = m.homeTeam && m.homeTeam.name === entry.country;
                  const opp  = isH ? (m.awayTeam ? m.awayTeam.name : "TBD") : (m.homeTeam ? m.homeTeam.name : "TBD");
                  const res  = calculateMatchPoints(m);
                  const myP  = isH ? res.homePoints : res.awayPoints;
                  const myS  = isH ? (m.homeScore || 0) : (m.awayScore || 0);
                  const oppS = isH ? (m.awayScore || 0) : (m.homeScore || 0);
                  const out  = myS > oppS ? "W" : myS < oppS ? "L" : "D";
                  const cls  = myP > 0 ? "pos" : myP < 0 ? "neg" : "zero";
                  const roundLabel = m.group ? `Group ${m.group}` : (m.round || "");
                  return `<div class="bd-row"><span class="bd-opp">vs ${opp}</span><span class="bd-score">${myS}–${oppS} <span class="bd-outcome ${out.toLowerCase()}">${out}</span></span><span class="bd-pts ${cls}">${myP > 0 ? "+" : ""}${myP}</span>${roundLabel ? `<span style="color:var(--text-muted);font-size:9px">${roundLabel}</span>` : ""}</div>`;
                }).join("");
              return `<div class="row-breakdown">${mbd || '<span class="bd-empty">No matches played yet</span>'}</div>`;
            })()}
          </div>`;
      }).join("");

      // Animated counters on first load; direct value set on subsequent refreshes
      if (!state._countersAnimated) {
        state._countersAnimated = true;
        list.querySelectorAll(".pts-num").forEach(function(el) {
          animateValue(el, 0, parseInt(el.dataset.v, 10) || 0, 900);
        });
      } else {
        list.querySelectorAll(".pts-num").forEach(function(el) {
          el.textContent = el.dataset.v;
        });
      }

      // Click-to-expand toggle (bind once)
      if (!list._expandBound) {
        list._expandBound = true;
        list.addEventListener("click", function(e) {
          const row = e.target.closest(".leaderboard-row");
          if (row) row.classList.toggle("expanded");
        });
      }
    }

    // ============================================================
    // LEADERBOARD AUTO-SCROLL

    // ============================================================
    // RENDER: TODAY'S MATCHES
    // Shows live matches first, then matches scheduled for today.
    // ============================================================
    function renderMatches() {
      const container = document.getElementById("matches-list");
      const now = new Date();

      const todayMatches = state.matches.filter(m => {
        if (m.status === "live") return true;
        if (m.status === "scheduled") return isSameDay(new Date(m.datetime), now);
        return false;
      });

      document.getElementById("matches-subtitle").textContent =
        `${todayMatches.length} match${todayMatches.length !== 1 ? "es" : ""}`;

      if (todayMatches.length === 0) {
        container.innerHTML = `
          <div style="padding:24px;text-align:center;color:var(--text-muted);font-size:14px;">
            No more matches today
          </div>`;
        return;
      }

      container.innerHTML = todayMatches.map((match) => {
        const isLive = match.status === "live";
        const minute = isLive && USE_MOCK_DATA ? state.liveMinute : null;

        const scoreBlock = isLive
          ? `<div class="match-score-block">
               <div class="match-score">${match.homeScore ?? 0}</div>
               <div class="match-score-divider">:</div>
               <div class="match-score">${match.awayScore ?? 0}</div>
             </div>`
          : `<div class="match-kickoff">${formatKickoff(match.datetime)}</div>`;

        const liveLabel = minute ? `LIVE ${minute}'` : `LIVE`;
        const statusBlock = isLive
          ? `<div class="match-status-badge"><div class="live-dot"></div><span class="live-text">${liveLabel}</span></div>`
          : `<div class="match-status-badge"><span class="upcoming-text">TODAY</span></div>`;

        const groupLabel = match.group
          ? `GROUP ${match.group} &middot; MD${match.matchday}`
          : `MD${match.matchday}`;

        // Build per-team event lines (goals + cards), sorted by minute
        const evts = match.events || [];
        const homeLines = evts
          .filter(e => e.team === "home")
          .sort((a, b) => a.minute - b.minute)
          .map(e => {
            if (e.type === "goal")        return `⚽ ${e.player} ${e.minute}'`;
            if (e.type === "own_goal")    return `↩️ ${e.player} ${e.minute}'`;
            if (e.type === "yellow_card") return `🟨 ${e.player} ${e.minute}'`;
            if (e.type === "red_card")    return `🟥 ${e.player} ${e.minute}'`;
            return null;
          }).filter(Boolean);

        const awayLines = evts
          .filter(e => e.team === "away")
          .sort((a, b) => a.minute - b.minute)
          .map(e => {
            if (e.type === "goal")        return `⚽ ${e.player} ${e.minute}'`;
            if (e.type === "own_goal")    return `↩️ ${e.player} ${e.minute}'`;
            if (e.type === "yellow_card") return `🟨 ${e.player} ${e.minute}'`;
            if (e.type === "red_card")    return `🟥 ${e.player} ${e.minute}'`;
            return null;
          }).filter(Boolean);

        const detailsRow = (homeLines.length || awayLines.length)
          ? `<div class="match-details">
               <div class="match-detail-home">${homeLines.map(l => `<div>${l}</div>`).join("")}</div>
               <div class="match-detail-center"></div>
               <div class="match-detail-away">${awayLines.map(l => `<div>${l}</div>`).join("")}</div>
             </div>` : "";

        // Live point impact per staff pick
        const result     = calculateMatchPoints(match);
        const homeStaff  = getStaffForCountry(match.homeTeam.name);
        const awayStaff  = getStaffForCountry(match.awayTeam.name);
        const impactLines = [];
        if (homeStaff.length > 0) {

            <span class="impact-pts ${pts > 0 ? "positive" : pts < 0 ? "negative" : "zero"}">${pts > 0 ? "+" : ""}${pts} pts</span>
          </div>`);
        }
        if (awayStaff.length > 0) {
          const pts = result.awayPoints;
          impactLines.push(`<div class="impact-line">
            <span class="impact-staff">${awayStaff.join(", ")}</span>
            <span class="impact-pts ${pts > 0 ? "positive" : pts < 0 ? "negative" : "zero"}">${pts > 0 ? "+" : ""}${pts} pts</span>
          </div>`);
        }
        const impactBlock = impactLines.length > 0
          ? `<div class="match-point-impact">${impactLines.join("")}</div>` : "";

        return `
          <div class="match-card ${isLive ? "live" : ""}">
            <div class="match-meta">
              ${statusBlock}
              <span class="match-group-label">${groupLabel}</span>
            </div>
            <div class="match-teams">
              <div class="match-team home">
                ${flagImg(match.homeTeam.flagCode, 28, 21, "match-team-flag")}
                <span class="match-team-name">${match.homeTeam.name}</span>
              </div>
              ${scoreBlock}
              <div class="match-team away">
                ${flagImg(match.awayTeam.flagCode, 28, 21, "match-team-flag")}
                <span class="match-team-name">${match.awayTeam.name}</span>
              </div>
            </div>
            ${detailsRow}
            ${impactBlock}
          </div>`;
      }).join("");
    }

    // ============================================================
    // RENDER: GROUP STANDINGS
    // Displays all group tables from the API with staff picks highlighted.
    // ============================================================
    function renderGroupStandings() {
      // Update panel header to reflect current phase
      const titleEl    = document.getElementById("groups-panel-title");
      const subtitleEl = document.getElementById("groups-panel-subtitle");
      if (isKnockoutPhase()) {
        if (titleEl)    titleEl.textContent    = "Tournament Bracket";
        if (subtitleEl) subtitleEl.textContent = "Knockout stage";
        renderKnockoutBracket();
        return;
      }
      if (titleEl)    titleEl.textContent    = "Group Standings";
      if (subtitleEl) subtitleEl.textContent = "Staff picks in red";

      const container = document.getElementById("groups-list");
      const standings = state.groupStandings;

      if (!standings.length) {
        container.innerHTML = `
          <div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px;">
            Loading standings...
          </div>`;
        return;
      }

      // Group rows by group letter
      const grouped = {};
      for (const row of standings) {
        const letter = (row.group?.name || "").replace("Group ", "").trim() || "?";
        if (!grouped[letter]) grouped[letter] = [];
        grouped[letter].push(row);
      }

      const sortedLetters = Object.keys(grouped).sort();
      const pickedCountries = new Set(state.staffPicks.map(p => p.country));

      container.innerHTML = sortedLetters.map(letter => {
        const rows = grouped[letter].slice().sort((a, b) => (a.position || 0) - (b.position || 0));

        const rowsHtml = rows.map(row => {
          const name  = row.team?.name || "?";
          const code  = getFlagCode(row.team?.country_code || "");
          const isPick = pickedCountries.has(name);
          const pos   = row.position || 0;
          const advancing = pos <= 2; // top 2 in each group advance

          return `
            <div class="group-row ${isPick ? "is-pick" : ""} ${advancing ? "advancing" : ""}">
              <span class="group-pos">${pos}</span>
              ${flagImg(code, 20, 15, "")}
              <span class="group-team-name ${isPick ? "is-pick" : ""}">${name}</span>
              <span class="group-stat">${row.won    || 0}</span>
              <span class="group-stat">${row.drawn  || 0}</span>
              <span class="group-stat">${row.lost   || 0}</span>
              <span class="group-pts-col ${isPick ? "is-pick" : ""}">${row.points || 0}</span>
            </div>`;
        }).join("");

        return `
          <div class="group-table">
            <div class="group-table-title">Group ${letter}</div>
            <div class="group-col-headers">
              <span></span><span></span>
              <span>Team</span>
              <span style="text-align:center">W</span>
              <span style="text-align:center">D</span>
              <span style="text-align:center">L</span>
              <span style="text-align:right">Pts</span>
            </div>
            ${rowsHtml}
          </div>`;
      }).join("");
    }

    // ============================================================
    // RENDER: KNOCKOUT BRACKET (desktop)
    // Shows knockout matches grouped by round, with staff picks
    // highlighted and winner sides tinted green.
    // Activated automatically by renderGroupStandings() after
    // KNOCKOUT_START_DATE.
    // ============================================================
    function renderKnockoutBracket() {
      const container = document.getElementById("bracket-list");
      const tabsEl    = document.getElementById("bracket-round-tabs");
      if (!container) return;

      const knockoutMatches = state.matches.filter(m => !m.group);

      if (!knockoutMatches.length) {
        if (tabsEl) tabsEl.innerHTML = "";
        container.innerHTML = `
          <div style="padding:40px;text-align:center;color:var(--text-muted);font-size:12px;">
            <div style="font-size:32px;margin-bottom:10px">🏆</div>
            <div style="font-weight:700;color:var(--text-secondary);margin-bottom:4px;font-size:14px">Knockout Stage</div>
            <div>Match schedule not yet available</div>
          </div>`;
        return;
      }

      // Group by round, sorted earliest first
      const rounds = {};
      for (const m of knockoutMatches) {
        const key = m.round || "Round";
        if (!rounds[key]) rounds[key] = [];
        rounds[key].push(m);
      }
      const sortedRoundNames = Object.keys(rounds).sort((a, b) => getRoundSortKey(a) - getRoundSortKey(b));
      const pickedCountries  = new Set(state.staffPicks.map(p => p.country));

      // Active round = earliest with live/scheduled; fallback to last
      const activeRound = sortedRoundNames.find(r =>
        rounds[r].some(m => m.status === "live" || m.status === "scheduled")
      ) || sortedRoundNames[sortedRoundNames.length - 1];

      // Determine which round to display.
      // Auto-advance to activeRound unless user manually picked a tab this session.
      if (!state._bracketUserSelected || !rounds[state.selectedBracketRound]) {
        state.selectedBracketRound = activeRound;
      }
      const showRound = state.selectedBracketRound;

      // ── Render round tabs ──────────────────────────────────────
      if (tabsEl) {
        tabsEl.innerHTML = sortedRoundNames.map(r => {
          const matchList = rounds[r];
          const allDone   = matchList.every(m => m.status === "completed");
          const hasLive   = matchList.some(m => m.status === "live");
          const isActive  = r === showRound;
          const abbr      = abbreviateRound(r);
          const count     = `${matchList.filter(m => m.status === "completed").length}/${matchList.length}`;
          let cls = "bk-tab";
          if (allDone) cls += " done";
          else if (hasLive) cls += " live";
          if (isActive) cls += " active";
          return `<button class="${cls}" data-round="${encodeURIComponent(r)}">${abbr} <span style="opacity:0.65;font-weight:400">${count}</span></button>`;
        }).join("");

        // Bind tab click handlers (use event delegation)
        if (!tabsEl._bound) {
          tabsEl._bound = true;
          tabsEl.addEventListener("click", function(e) {
            const btn = e.target.closest(".bk-tab");
            if (!btn) return;
            state._bracketUserSelected = true;
            state.selectedBracketRound = decodeURIComponent(btn.dataset.round);
            renderKnockoutBracket();
          });
        }
      }

      // ── Helper: build click-to-expand events block ─────────────
      function buildBkDetails(m) {
        const evts = (m.events || []).filter(e =>
          ["goal","own_goal","yellow_card","red_card"].includes(e.type)
        ).sort((a, b) => a.minute - b.minute);
        if (!evts.length) return `<div class="bk-no-events">No events recorded</div>`;
        return evts.map(e => {
          const icon = e.type === "goal" ? "⚽" : e.type === "own_goal" ? "↩️"
            : e.type === "yellow_card" ? "🟨" : "🟥";
          const side = e.team === "home" ? (m.homeTeam?.name || "Home") : (m.awayTeam?.name || "Away");
          return `<div class="bk-event-row">
            <span class="bk-event-icon">${icon}</span>
            <span class="bk-event-time">${e.minute}'</span>
            <span class="bk-event-player">${e.player || "Unknown"}</span>
            <span class="bk-event-team">${side}</span>
          </div>`;
        }).join("");
      }

      // ── Render selected round's matches ───────────────────────
      const matchList   = rounds[showRound];
      const isSingleCol = matchList.length <= 2
        || showRound.toLowerCase().includes("semi")
        || (showRound.toLowerCase().includes("final") && !showRound.toLowerCase().includes("semi") && !showRound.toLowerCase().includes("third"));
      const gridClass   = isSingleCol ? "single-col" : "";
      const isFinalRound = showRound.toLowerCase().includes("final")
        && !showRound.toLowerCase().includes("semi")
        && !showRound.toLowerCase().includes("third");

      const matchesHtml = matchList.map(m => {
        const isLive      = m.status === "live";
        const isCompleted = m.status === "completed";
        const hasScore    = isLive || isCompleted;

        const hName = m.homeTeam?.name || "TBD";
        const aName = m.awayTeam?.name || "TBD";
        const hFlag = m.homeTeam?.flagCode ? flagImg(m.homeTeam.flagCode, 20, 15) : "";
        const aFlag = m.awayTeam?.flagCode ? flagImg(m.awayTeam.flagCode, 20, 15) : "";
        const hPick = pickedCountries.has(hName);
        const aPick = pickedCountries.has(aName);
        const hStaff = state.staffPicks.filter(p => p.country === hName).map(p => p.name.split(" ")[0]).join(", ");
        const aStaff = state.staffPicks.filter(p => p.country === aName).map(p => p.name.split(" ")[0]).join(", ");

        let hWin = false, aWin = false;
        if (isCompleted) {
          const hs = m.homeScore ?? 0, as = m.awayScore ?? 0;
          hWin = hs > as; aWin = as > hs;
          if (!hWin && !aWin) {
            const hp = m.homePenalties ?? null, ap = m.awayPenalties ?? null;
            if (hp !== null && ap !== null) { hWin = hp > ap; aWin = ap > hp; }
          }
        }

        const hScore = hasScore ? (m.homeScore ?? 0) : null;
        const aScore = hasScore ? (m.awayScore ?? 0) : null;
        const hPen   = (isCompleted && m.homePenalties != null) ? ` (${m.homePenalties})` : "";
        const aPen   = (isCompleted && m.awayPenalties != null) ? ` (${m.awayPenalties})` : "";

        const dateStr  = m.datetime ? new Date(m.datetime).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "";
        const timeStr  = m.datetime ? formatKickoff(m.datetime) : "";
        const timeLabel = dateStr ? `${dateStr} · ${timeStr}` : "";

        const resultLabel = isCompleted ? "FT" : isLive ? "" : "";

        return `
          <div class="bk-match${isLive ? " is-live" : ""}${isFinalRound ? " is-final" : ""}" onclick="this.classList.toggle('expanded')">
            <div class="bk-match-time">
              <span>${isLive ? "" : (isCompleted ? `${timeLabel}` : timeLabel)}</span>
              <span style="display:flex;align-items:center;gap:4px">
                ${isCompleted ? `<span style="font-size:8px;font-weight:700;color:var(--text-muted)">FT</span>` : ""}
                ${isLive ? `<span class="bk-live-badge">● LIVE</span>` : ""}
                <span class="bk-expand-icon">▾</span>
              </span>
            </div>
            <div class="bk-team${hPick ? " is-pick" : ""}${hWin ? " winner" : ""}">
              <span class="bk-team-flag">${hFlag}</span>
              <div class="bk-team-info">
                <div class="bk-team-name${hPick ? " is-pick" : ""}${hName === "TBD" ? " bk-tbd" : ""}">${hName}</div>
                ${hStaff ? `<div class="bk-team-staff">${hStaff}</div>` : ""}
              </div>
              <span class="bk-team-score${hWin ? " winner-score" : ""}${isLive ? " is-live" : ""}${hScore === null ? " tbd" : ""}">${hScore !== null ? hScore + hPen : "–"}</span>
            </div>
            <div class="bk-team${aPick ? " is-pick" : ""}${aWin ? " winner" : ""}">
              <span class="bk-team-flag">${aFlag}</span>
              <div class="bk-team-info">
                <div class="bk-team-name${aPick ? " is-pick" : ""}${aName === "TBD" ? " bk-tbd" : ""}">${aName}</div>
                ${aStaff ? `<div class="bk-team-staff">${aStaff}</div>` : ""}
              </div>
              <span class="bk-team-score${aWin ? " winner-score" : ""}${isLive ? " is-live" : ""}${aScore === null ? " tbd" : ""}">${aScore !== null ? aScore + aPen : "–"}</span>
            </div>
            <div class="bk-match-details">${buildBkDetails(m)}</div>
          </div>`;
      }).join("");

      const completed = matchList.filter(m => m.status === "completed").length;
      container.innerHTML = `
        <div class="bk-round-section active-round" style="margin-bottom:0">
          <div class="bk-round-header">
            <span class="bk-round-name">${showRound}</span>
            <span class="bk-round-progress">${completed} / ${matchList.length} completed</span>
          </div>
          <div class="bk-match-grid ${gridClass}">${matchesHtml}</div>
        </div>`;
    }

    // ============================================================
    // RENDER: GOLDEN BOOT
    // Aggregates goals from all match events, shows top scorers.
    // ============================================================
    function renderGoldenBoot() {
      const list = document.getElementById("golden-boot-list");
      const scorers = {};
      const teamFlagMap = {};

      // Single pass: build flag map and count goals simultaneously
      for (const match of state.matches) {
        const homeName = match.homeTeam?.name || "";
        const awayName = match.awayTeam?.name || "";
        if (homeName) teamFlagMap[homeName] = match.homeTeam.flagCode;
        if (awayName) teamFlagMap[awayName] = match.awayTeam.flagCode;

        if (!match.events) continue;
        for (const e of match.events) {
          if (e.type !== "goal") continue;
          const player = e.player || "Unknown";
          const teamName = e.team === "home" ? homeName : awayName;
          const key = player + "|" + teamName;
          if (!scorers[key]) scorers[key] = { player, team: teamName, goals: 0 };
          scorers[key].goals++;
        }
      }

      const sorted = Object.values(scorers).sort((a, b) => b.goals - a.goals);

      if (sorted.length === 0) {
        list.innerHTML = `<div style="padding:12px;color:var(--text-muted);font-size:11px;text-align:center;">No goals recorded yet</div>`;
        return;
      }

      let rank = 1;
      list.innerHTML = sorted.map((s, i) => {
        if (i > 0 && s.goals < sorted[i - 1].goals) rank = i + 1;
        const medal = rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : rank;
        const flagCode = teamFlagMap[s.team];
        const flag = flagCode ? flagImg(flagCode, 20, 15) : "🏳";
        return `
          <div class="boot-row">
            <span class="boot-rank">${medal}</span>
            <span class="boot-flag">${flag}</span>
            <span class="boot-player">${s.player} <span style="color:var(--text-muted);font-size:10px;font-weight:400">${s.team}</span></span>
            <span class="boot-goals">${s.goals}⚽</span>
          </div>`;
      }).join("");
    }

    // ============================================================
    // RENDER: TODAY'S POINT MOVERS
    // Shows how many points each staff member earned today.
    // ============================================================
    function renderPointMovers() {
      const list = document.getElementById("movers-list");
      const today = new Date();

      // Get today's matches (live or completed)
      const todayMatches = state.matches.filter(m =>
        (m.status === "live" || m.status === "completed") &&
        isSameDay(new Date(m.datetime), today)
      );

      // Calculate today's points per country
      const todayCountryPts = {};
      for (const match of todayMatches) {
        const result = calculateMatchPoints(match);
        const home = match.homeTeam ? match.homeTeam.name : "";
        const away = match.awayTeam ? match.awayTeam.name : "";
        if (home) todayCountryPts[home] = (todayCountryPts[home] || 0) + result.homePoints;
        if (away) todayCountryPts[away] = (todayCountryPts[away] || 0) + result.awayPoints;
      }

      // Map to staff picks
      const movers = state.staffPicks.map(p => ({
        name: p.name,
        country: p.country,
        pts: todayCountryPts[p.country] || 0,
      })).sort((a, b) => b.pts - a.pts || a.name.localeCompare(b.name));

      if (todayMatches.length === 0) {
        list.innerHTML = `<div style="padding:12px;color:var(--text-muted);font-size:11px;text-align:center;">No matches today yet</div>`;
        return;
      }

      const active = movers.filter(m => m.pts !== 0);
      const display = active.length > 0 ? active : movers;

      list.innerHTML = display.map(m => {
        const cls = m.pts > 0 ? "positive" : m.pts < 0 ? "negative" : "zero";
        const delta = m.pts > 0 ? `+${m.pts}` : `${m.pts}`;
        return `
          <div class="mover-row">
            <span class="mover-name">${m.name}</span>
            <span class="mover-country">${m.country}</span>
            <span class="mover-delta ${cls}">${delta} pts</span>
          </div>`;
      }).join("");
    }

    // ============================================================
    // RENDER: STAFF PICK SUMMARY
    // One row per unique picked country with staff names, points,
    // form (W/D/L last 3), and next match time.
    // ============================================================
    function renderStaffPickSummary() {
      const list = document.getElementById("picks-summary-list");
      const today = new Date();

      // Deduplicate countries in pick order
      const seen = new Set();
      const countries = [];
      for (const p of state.staffPicks) {
        if (!seen.has(p.country)) { seen.add(p.country); countries.push(p); }
      }

      const rows = countries.map(pick => {
        const cp = state.countryPoints[pick.country] || {};
        const pts = cp.points || 0;
        const staffNames = state.staffPicks
          .filter(p => p.country === pick.country)
          .map(p => p.name.split(" ")[0])
          .join(", ");

        // Form: last 3 completed matches, sorted by date
        const completed = state.matches
          .filter(m => m.status === "completed" &&
            (m.homeTeam?.name === pick.country || m.awayTeam?.name === pick.country))
          .sort((a, b) => new Date(a.datetime) - new Date(b.datetime))
          .slice(-3);

        const form = completed.map(m => {
          const isHome = m.homeTeam?.name === pick.country;
          const myScore  = isHome ? (m.homeScore || 0) : (m.awayScore || 0);
          const oppScore = isHome ? (m.awayScore || 0) : (m.homeScore || 0);
          if (myScore > oppScore) return '<span style="color:var(--positive)">W</span>';
          if (myScore < oppScore) return '<span style="color:var(--negative)">L</span>';
          return '<span style="color:var(--gold)">D</span>';
        }).join(" ");

        // Next match
        const next = state.matches.find(m =>
          m.status === "scheduled" &&
          (m.homeTeam?.name === pick.country || m.awayTeam?.name === pick.country)
        );
        let nextText = "—";
        if (next) {
          const opp = next.homeTeam?.name === pick.country ? next.awayTeam?.name : next.homeTeam?.name;
          const isToday = isSameDay(new Date(next.datetime), today);
          nextText = (isToday ? "Today " : "") + "vs " + (opp || "TBD") + " " + formatKickoff(next.datetime);
        }

        return `
          <div class="pick-summary-row">
            ${flagImg(pick.countryCode, 24, 18)}
            <div class="pick-summary-info">
              <span class="pick-summary-country">${pick.country}</span>
              <span class="pick-summary-staff">${staffNames}</span>
              <span class="pick-summary-next">${nextText}</span>
            </div>
            <div class="pick-summary-right">
              <span class="pick-summary-pts">${pts}</span>
              <span class="pick-summary-form">${form || "—"}</span>
            </div>
          </div>`;
      });

      list.innerHTML = rows.join("");
    }

    // ============================================================
    // RENDER: COUNTRY STATUS BAR
    // Shows one tile per unique picked country.
    // ============================================================
    function renderCountryGrid() {
      const grid = document.getElementById("country-grid");

      // Deduplicate picked countries (preserve insertion order for consistency)
      const seen = new Set();
      const uniquePicks = state.staffPicks.filter((s) => {
        if (seen.has(s.country)) return false;
        seen.add(s.country);
        return true;
      });

      grid.innerHTML = uniquePicks.map((pick) => {
        const cp = state.countryPoints[pick.country] || { points: 0, isLive: false };

        // Determine if this country has a match scheduled for today
        const today = new Date();
        const hasUpcoming = state.matches.some(m =>
          m.status === "scheduled" &&
          isSameDay(new Date(m.datetime), today) &&
          (m.homeTeam.name === pick.country || m.awayTeam.name === pick.country)
        );

        let dotClass = "none";
        if (cp.isLive)       dotClass = "live";
        else if (cp.points > 0) dotClass = "active";
        else if (hasUpcoming)   dotClass = "upcoming";

        return `
          <div class="country-tile status-${dotClass}">
            ${flagImg(pick.countryCode, 24, 18, "country-tile-flag")}
            <span class="country-tile-name">${pick.country}</span>
            <span class="country-tile-pts">${cp.points}pts</span>
            <div class="country-tile-dot ${dotClass}"></div>
          </div>`;
      }).join("");
    }

    // ============================================================
    // ANIMATED COUNTER
    // Counts a number from `from` to `to` over `duration` ms.
    // Uses ease-out cubic for a natural deceleration feel.
    // ============================================================
    function animateValue(el, from, to, duration) {
      if (from === to) { el.textContent = to; return; }
      const start = performance.now();
      function tick(now) {
        const t = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        el.textContent = Math.round(from + (to - from) * eased);
        if (t < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

        btn.classList.add("active");

      });
    });
