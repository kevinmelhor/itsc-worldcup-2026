    // ============================================================
    // MOBILE RENDER: LEADERBOARD
    // ============================================================
    function renderMobileLeaderboard() {
      const el = document.getElementById("mob-leaderboard");
      if (!el) return;

      const entries = state.staffPicks.map(function(p) {
        const cp = state.countryPoints[p.country] || { points: 0 };
        return { name: p.name, country: p.country, countryCode: p.countryCode, points: cp.points };
      }).sort(function(a, b) {
        return b.points !== a.points ? b.points - a.points : a.name.localeCompare(b.name);
      });

      const maxPts = entries.length > 0 && entries[0].points > 0 ? entries[0].points : 1;

      // Tier-based medals: two people tied at rank 2 both get 🥈,
      // and the next person (rank 4) still gets a number, not 🥉.
      const mobUniquePts = [...new Set(entries.map(function(e) { return e.points; }))].sort(function(a, b) { return b - a; });

      let rank = 1;
      el.innerHTML = entries.map(function(e, i) {
        if (i > 0 && e.points < entries[i - 1].points) rank = i + 1;
        const tier    = mobUniquePts.indexOf(e.points) + 1;
        const isTop3  = tier <= 3;
        const medal   = tier === 1 ? "🥇" : tier === 2 ? "🥈" : tier === 3 ? "🥉" : null;
        const rankEl  = medal
          ? `<div class="mob-lb-rank">${medal}</div>`
          : `<div class="mob-lb-rank"><span class="mob-lb-rank-num">${rank}</span></div>`;
        const barPct  = Math.max(Math.round((e.points / maxPts) * 100), e.points > 0 ? 2 : 0);
        const barClr  = tier === 1 ? "var(--gold)" : tier <= 3 ? "var(--scarlet)" : "var(--text-muted)";
        return `
          <div class="mob-lb-row${isTop3 ? " top3" : ""}" style="position:relative;overflow:hidden">
            ${rankEl}
            ${flagImg(e.countryCode, 28, 21)}
            <div class="mob-lb-info">
              <div class="mob-lb-name">${e.name}</div>
              <div class="mob-lb-country">${e.country}</div>
            </div>
            <div class="mob-lb-pts">${e.points}</div>
            <div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--border)">
              <div style="height:100%;width:${barPct}%;background:${barClr};transition:width 0.8s ease"></div>
            </div>
          </div>`;
      }).join("");
    }

    // ============================================================
    // MOBILE RENDER: MATCHES
    // ============================================================
    function renderMobileMatches() {
      const el = document.getElementById("mob-matches");
      if (!el) return;

      const today = new Date();
      const todayMatches = state.matches.filter(function(m) {
        return isSameDay(new Date(m.datetime), today);
      });
      const upcoming = state.matches.filter(function(m) {
        return m.status === "scheduled" && !isSameDay(new Date(m.datetime), today);
      }).slice(0, 6);

      if (todayMatches.length === 0 && upcoming.length === 0) {
        el.innerHTML = `<div class="mob-no-matches">No matches scheduled today</div>`;
        return;
      }

      let html = "";
      if (todayMatches.length > 0) {
        html += `<div class="mob-section-title">Today's Matches</div>`;
        html += todayMatches.map(mobMatchCard).join("");
      }
      if (upcoming.length > 0) {
        html += `<div class="mob-section-title" style="margin-top:14px">Upcoming</div>`;
        html += upcoming.map(mobMatchCard).join("");
      }
      el.innerHTML = html;
    }

    function mobMatchCard(m) {
      const home = m.homeTeam ? m.homeTeam.name : "TBD";
      const away = m.awayTeam ? m.awayTeam.name : "TBD";
      const homeFlag = m.homeTeam && m.homeTeam.flagCode ? flagImg(m.homeTeam.flagCode, 22, 16) : "";
      const awayFlag = m.awayTeam && m.awayTeam.flagCode ? flagImg(m.awayTeam.flagCode, 22, 16) : "";
      const isLive      = m.status === "live";
      const isCompleted = m.status === "completed";

      let scoreHtml;
      if (isLive) {
        scoreHtml = `<div class="mob-match-score is-live">${m.homeScore ?? 0}–${m.awayScore ?? 0}</div>`;
      } else if (isCompleted) {
        scoreHtml = `<div class="mob-match-score">${m.homeScore ?? 0}–${m.awayScore ?? 0}</div>`;
      } else {
        scoreHtml = `<div class="mob-match-score kickoff">${formatKickoff(m.datetime)}</div>`;
      }

      const staffHome = getStaffForCountry(home);
      const staffAway = getStaffForCountry(away);
      const staffParts = staffHome.map(function(n) { return n + " 🔴"; })
                 .concat(staffAway.map(function(n) { return n + " 🔵"; }));
      const staffLine = staffParts.length
        ? `<span class="mob-staff-badge">${staffParts.join(" · ")}</span>` : "";
      const liveLine  = isLive ? `<span class="mob-live-badge">🔴 LIVE</span>` : `<span></span>`;

      return `
        <div class="mob-match-card${isLive ? " is-live" : ""}">
          <div class="mob-match-teams">
            <div class="mob-match-team">${homeFlag}<span>${home}</span></div>
            ${scoreHtml}
            <div class="mob-match-team away"><span>${away}</span>${awayFlag}</div>
          </div>
          <div class="mob-match-meta">${liveLine}${staffLine}</div>
        </div>`;
    }

    // ============================================================
    // MOBILE RENDER: BRACKET
    // Tab-based round selector, matches the desktop bracket.
    // ============================================================
    function renderMobileBracket() {
      const el = document.getElementById("mob-bracket");
      if (!el) return;

      const knockoutMatches = state.matches.filter(function(m) { return !m.group; });

      if (!knockoutMatches.length) {
        el.innerHTML = `<div class="mob-no-matches">Knockout stage schedule coming soon</div>`;
        return;
      }

      const rounds = {};
      for (const m of knockoutMatches) {
        const key = m.round || "Round";
        if (!rounds[key]) rounds[key] = [];
        rounds[key].push(m);
      }
      const sortedRoundNames = Object.keys(rounds).sort(function(a, b) { return getRoundSortKey(a) - getRoundSortKey(b); });
      const pickedCountries  = new Set(state.staffPicks.map(function(p) { return p.country; }));

      const activeRound = sortedRoundNames.find(function(r) {
        return rounds[r].some(function(m) { return m.status === "live" || m.status === "scheduled"; });
      }) || sortedRoundNames[sortedRoundNames.length - 1];

      // Sync with desktop: auto-advance unless user manually picked a tab
      if (!state._bracketUserSelected || !rounds[state.selectedBracketRound]) {
        state.selectedBracketRound = activeRound;
      }
      const showRound = state.selectedBracketRound;

      // Build tabs HTML
      const tabsHtml = sortedRoundNames.map(function(r) {
        const matchList = rounds[r];
        const allDone   = matchList.every(function(m) { return m.status === "completed"; });
        const hasLive   = matchList.some(function(m) { return m.status === "live"; });
        const isActive  = r === showRound;
        const abbr      = abbreviateRound(r);
        const count     = matchList.filter(function(m) { return m.status === "completed"; }).length + "/" + matchList.length;
        var cls = "bk-tab";
        if (allDone) cls += " done";
        else if (hasLive) cls += " live";
        if (isActive) cls += " active";
        return `<button class="${cls}" data-round="${encodeURIComponent(r)}">${abbr} <span style="opacity:0.65;font-weight:400">${count}</span></button>`;
      }).join("");

      // Build matches for the selected round
      const matchList = rounds[showRound];
      const isFinalRound = showRound.toLowerCase().includes("final") && !showRound.toLowerCase().includes("semi") && !showRound.toLowerCase().includes("third");
      const completed    = matchList.filter(function(m) { return m.status === "completed"; }).length;

      const matchesHtml = matchList.map(function(m) {
        const isLive      = m.status === "live";
        const isCompleted = m.status === "completed";
        const hasScore    = isLive || isCompleted;
        const isFinal     = isFinalRound;

        const hName = (m.homeTeam && m.homeTeam.name) || "TBD";
        const aName = (m.awayTeam && m.awayTeam.name) || "TBD";
        const hFlag = (m.homeTeam && m.homeTeam.flagCode) ? flagImg(m.homeTeam.flagCode, 22, 16) : "";
        const aFlag = (m.awayTeam && m.awayTeam.flagCode) ? flagImg(m.awayTeam.flagCode, 22, 16) : "";
        const hPick = pickedCountries.has(hName);
        const aPick = pickedCountries.has(aName);

        var hWin = false, aWin = false;
        if (isCompleted) {
          const hs = m.homeScore || 0, as = m.awayScore || 0;
          hWin = hs > as; aWin = as > hs;
          if (!hWin && !aWin) {
            const hp = m.homePenalties != null ? m.homePenalties : null;
            const ap = m.awayPenalties != null ? m.awayPenalties : null;
            if (hp !== null && ap !== null) { hWin = hp > ap; aWin = ap > hp; }
          }
        }

        const hScore = hasScore ? (m.homeScore != null ? m.homeScore : 0) : null;
        const aScore = hasScore ? (m.awayScore != null ? m.awayScore : 0) : null;
        const timeLabel = m.datetime
          ? new Date(m.datetime).toLocaleDateString("en-US", { month: "short", day: "numeric" }) + " · " + formatKickoff(m.datetime)
          : "";
        const hStaff = state.staffPicks.filter(function(p) { return p.country === hName; }).map(function(p) { return p.name.split(" ")[0]; }).join(", ");
        const aStaff = state.staffPicks.filter(function(p) { return p.country === aName; }).map(function(p) { return p.name.split(" ")[0]; }).join(", ");

        return `
          <div class="mob-bracket-match${isLive ? " is-live" : ""}${isFinal ? " is-final" : ""}">
            <div style="font-size:9px;color:var(--text-muted);padding:3px 8px;background:rgba(0,0,0,0.15);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
              <span>${isCompleted ? timeLabel : (hasScore ? timeLabel : timeLabel)}</span>
              <span>${isCompleted ? '<span style="font-size:8px;font-weight:700;color:var(--text-muted)">FT</span>' : ""}${isLive ? '<span style="color:var(--live-green);font-weight:800">● LIVE</span>' : ""}</span>
            </div>
            <div class="mob-bracket-row${hPick ? " is-pick" : ""}${hWin ? " winner" : ""}">
              ${hFlag}
              <div style="flex:1;min-width:0">
                <div class="mob-bracket-row-name${hPick ? " is-pick" : ""}">${hName}</div>
                ${hStaff ? `<div style="font-size:9px;color:var(--scarlet);margin-top:1px">${hStaff}</div>` : ""}
              </div>
              <span class="mob-bracket-row-score${hScore === null ? " tbd" : isLive ? " is-live" : ""}${hWin ? " winner" : ""}">${hScore !== null ? hScore : "–"}</span>
            </div>
            <div class="mob-bracket-row${aPick ? " is-pick" : ""}${aWin ? " winner" : ""}">
              ${aFlag}
              <div style="flex:1;min-width:0">
                <div class="mob-bracket-row-name${aPick ? " is-pick" : ""}">${aName}</div>
                ${aStaff ? `<div style="font-size:9px;color:var(--scarlet);margin-top:1px">${aStaff}</div>` : ""}
              </div>
              <span class="mob-bracket-row-score${aScore === null ? " tbd" : isLive ? " is-live" : ""}${aWin ? " winner" : ""}">${aScore !== null ? aScore : "–"}</span>
            </div>
          </div>`;
      }).join("");

      el.innerHTML = `
        <div style="display:flex;gap:4px;padding:10px 12px 8px;overflow-x:auto;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.1)" id="mob-bracket-tabs">
          ${tabsHtml}
        </div>
        <div style="padding:8px 10px 10px">
          <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:6px">
            ${showRound} · ${completed}/${matchList.length} completed
          </div>
          ${matchesHtml}
        </div>`;

      // Bind tab clicks
      const mobTabsEl = el.querySelector("#mob-bracket-tabs");
      if (mobTabsEl && !mobTabsEl._bound) {
        mobTabsEl._bound = true;
        mobTabsEl.addEventListener("click", function(e) {
          const btn = e.target.closest(".bk-tab");
          if (!btn) return;
          state._bracketUserSelected = true;
          state.selectedBracketRound = decodeURIComponent(btn.dataset.round);
          renderMobileBracket();
        });
      }
    }

    // ============================================================
    // MOBILE RENDER: MORE (Golden Boot + Staff Picks)
    // ============================================================
    function renderMobileMore() {
      const el = document.getElementById("mob-more");
      if (!el) return;

      // Golden Boot
      const scorers = {};
      const teamFlagMap = {};
      state.matches.forEach(function(match) {
        const homeName = match.homeTeam ? match.homeTeam.name : "";
        const awayName = match.awayTeam ? match.awayTeam.name : "";
        if (homeName) teamFlagMap[homeName] = match.homeTeam.flagCode;
        if (awayName) teamFlagMap[awayName] = match.awayTeam.flagCode;
        if (!match.events) return;
        match.events.forEach(function(e) {
          if (e.type !== "goal") return;
          const player   = e.player || "Unknown";
          const teamName = e.team === "home" ? homeName : awayName;
          const key = player + "|" + teamName;
          if (!scorers[key]) scorers[key] = { player: player, team: teamName, goals: 0 };
          scorers[key].goals++;
        });
      });

      const sorted = Object.values(scorers).sort(function(a, b) { return b.goals - a.goals; });
      let bootRank = 1;
      const bootRows = sorted.length ? sorted.map(function(s, i) {
        if (i > 0 && s.goals < sorted[i - 1].goals) bootRank = i + 1;
        const medal    = bootRank === 1 ? "🥇" : bootRank === 2 ? "🥈" : bootRank === 3 ? "🥉" : bootRank;
        const flagCode = teamFlagMap[s.team];
        const flag     = flagCode ? flagImg(flagCode, 20, 15) : "🏳";
        return `
          <div class="mob-boot-row">
            <span>${medal}</span>${flag}
            <span class="mob-boot-player">${s.player}
              <span style="color:var(--text-muted);font-size:10px;font-weight:400"> ${s.team}</span>
            </span>
            <span class="mob-boot-goals">${s.goals} ⚽</span>
          </div>`;
      }).join("") : `<div style="padding:14px;text-align:center;color:var(--text-muted);font-size:12px">No goals recorded yet</div>`;

      // Staff picks summary
      const seen = new Set();
      const countries = [];
      state.staffPicks.forEach(function(p) {
        if (!seen.has(p.country)) { seen.add(p.country); countries.push(p); }
      });

      const pickRows = countries.map(function(pick) {
        const pts   = (state.countryPoints[pick.country] || {}).points || 0;
        const staff = state.staffPicks
          .filter(function(p) { return p.country === pick.country; })
          .map(function(p) { return p.name.split(" ")[0]; })
          .join(", ");
        return `
          <div class="mob-pick-row">
            ${flagImg(pick.countryCode, 26, 20)}
            <div class="mob-pick-info">
              <div class="mob-pick-country">${pick.country}</div>
              <div class="mob-pick-staff">${staff}</div>
            </div>
            <div class="mob-pick-pts">${pts}</div>
          </div>`;
      }).join("");

      el.innerHTML = `
        <div class="mob-section-title">⚽ Golden Boot</div>
        <div class="mob-card">${bootRows}</div>
        <div class="mob-section-title" style="margin-top:14px">🌍 Staff Picks by Country</div>
        <div class="mob-card">${pickRows}</div>`;
    }

    // ============================================================
    // REFRESH LOOP
    // Polls for new data on a set interval.
    // ============================================================
    async function refresh() {
      // Reset manual tab selection so the bracket auto-advances to the current active round
      state._bracketUserSelected = false;
      await loadData();
      renderAll();
    }

    // ============================================================
    // GROUP STANDINGS AUTO-SCROLL
    // Slowly scrolls the group panel up and down in a loop.
    // Pauses briefly at the top and bottom before reversing.
    // ============================================================
    function startGroupScroll() {
      // Auto-scroll the leaderboard so all participants are visible
      const el = document.getElementById("leaderboard-scroll");
      if (!el) return;

      const SPEED     = 0.4;   // px per frame (~24px/sec at 60fps)
      const PAUSE_MS  = 1800;  // pause at top/bottom before reversing

      let direction = 1; // 1 = scrolling down, -1 = scrolling up
      let paused    = false;
      let rafId     = null;

      function pause() {
        paused = true;
        setTimeout(() => { paused = false; }, PAUSE_MS);
      }

      function tick() {
        if (!paused) {
          el.scrollTop += SPEED * direction;

          const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 1;
          const atTop    = el.scrollTop <= 0;

          if (direction === 1 && atBottom) {
            el.scrollTop = el.scrollHeight; // snap to true bottom
            direction = -1;
            pause();
          } else if (direction === -1 && atTop) {
            el.scrollTop = 0;
            direction = 1;
            pause();
          }
        }
        rafId = requestAnimationFrame(tick);
      }

      // Pause scroll while the user hovers over the panel
      el.addEventListener("mouseenter", () => { paused = true; });
      el.addEventListener("mouseleave", () => { paused = false; });

      rafId = requestAnimationFrame(tick);
    }

    // ============================================================
    // BOOT
    // ============================================================
    (async function boot() {
      startClock();
      await loadData();
      renderAll();
      startLiveTicker();
      startGroupScroll();
      setInterval(refresh, REFRESH_INTERVAL_MS);
    })();
  </script>
